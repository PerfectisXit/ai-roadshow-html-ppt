    const SLIDE_ANIMATION_HOOKS = {
      s05: playVoiceChat,
      s06: playTerminalLog,
      s51: playEnding
    };

    function stripHtml(input) {
      return String(input || "")
        .replace(/<br\s*\/?>/gi, " ")
        .replace(/<[^>]+>/g, " ")
        .replace(/&nbsp;/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function wrapTitle(prefix, title) {
      return `<span class="title-prefix">${prefix}</span><span class="title-sep">丨</span><span class="title-main">${title}</span>`;
    }

    function appendClassName(source, className) {
      const classes = new Set(String(source || "").split(/\s+/).filter(Boolean));
      classes.add(className);
      return Array.from(classes).join(" ");
    }

    function applySlideClassFixes(slide) {
      for (const [className, idSet] of Object.entries(SLIDE_CLASS_FIXES)) {
        if (idSet.has(slide.id)) {
          slide.className = appendClassName(slide.className, className);
        }
      }
    }

    function applyTitleAndSubtitleNormalization(slide) {
      if (SLIDE_TITLE_PREFIXES[slide.id] && !/title-prefix/.test(slide.title)) {
        slide.title = wrapTitle(SLIDE_TITLE_PREFIXES[slide.id], slide.title);
      }
      if (Object.prototype.hasOwnProperty.call(SLIDE_KICKERS, slide.id)) {
        if (SLIDE_KICKERS[slide.id]) slide.kicker = SLIDE_KICKERS[slide.id];
        else delete slide.kicker;
      }
      if (Object.prototype.hasOwnProperty.call(SLIDE_SUBTITLE_OVERRIDES, slide.id)) {
        if (SLIDE_SUBTITLE_OVERRIDES[slide.id]) slide.subtitle = SLIDE_SUBTITLE_OVERRIDES[slide.id];
        else delete slide.subtitle;
      } else if (slide.subtitle && !PRESERVE_SUBTITLE_IDS.has(slide.id) && SUBTITLE_CLEANUP_PATTERNS.some((pattern) => pattern.test(slide.subtitle))) {
        delete slide.subtitle;
      }
    }

    function applyLegacyHtmlCleanup(slide) {
      if (slide.id === "s01") {
        slide.html = slide.html
          .replace(/<div class="pill-row">[\s\S]*?<\/div>/, "")
          .replace(/<div class="cover-hint">[\s\S]*?<\/div>/, "");
      }
      if (slide.id === "s04") {
        slide.html = slide.html.replace(/<div class="card">\s*<h3>这一页的作用<\/h3>[\s\S]*?<\/div>\s*<\/div>\s*<\/div>$/, "</div>\n            </div>");
      }
      if (slide.id === "s08") {
        slide.html = slide.html.replace(/<div class="card">\s*<h3>这一页的演讲节奏<\/h3>[\s\S]*?<\/div>/, "");
      }
      if (slide.id === "s29") {
        slide.html = slide.html.replace(/<div class="card">\s*<h3>这一页的任务<\/h3>[\s\S]*?<\/div>\s*<\/div>\s*<\/div>$/, "</div>\n          </div>");
      }
    }

    // Page numbering uses only visible slides, not the raw array length.
    function assignPageMetadata() {
      const visibleSlides = slides.filter((slide) => !slide.noPage);
      const visibleTotal = visibleSlides.length;
      let visibleIndex = 0;
      slides.forEach((slide, index) => {
        slide.absolutePage = index + 1;
        if (slide.noPage) {
          delete slide.visiblePageNumber;
          delete slide.visiblePageLabel;
          return;
        }
        visibleIndex += 1;
        slide.visiblePageNumber = visibleIndex;
        slide.visiblePageLabel = `${String(visibleIndex).padStart(2, "0")} / ${String(visibleTotal).padStart(2, "0")}`;
      });
    }

    function normalizeSlides() {
      for (const slide of slides) {
        applyTitleAndSubtitleNormalization(slide);
        applyLegacyHtmlCleanup(slide);
        applySlideClassFixes(slide);
        slide.titleText = stripHtml(slide.title);
      }

      assignPageMetadata();
    }

    // Support three addressing modes:
    // 1. absolute array order (legacy)
    // 2. visible page number shown in the UI
    // 3. stable slide id such as "s10"
    function findSlideIndexByRef(raw) {
      const token = String(raw || "").trim();
      if (!token) return 0;
      const parsed = Number(token);
      if (!Number.isNaN(parsed)) {
        if (parsed >= 1 && parsed <= totalSlides) return parsed - 1;
        const visibleHit = slides.findIndex((slide) => slide.visiblePageNumber === parsed);
        if (visibleHit >= 0) return visibleHit;
      }
      const byId = slides.findIndex((slide) => slide.id === token);
      return byId >= 0 ? byId : 0;
    }

    normalizeSlides();

    const deck = document.getElementById("deck");
    const totalSlides = slides.length;

    function buildSlideAttributes(slide, index) {
      const attrs = [
        `class="slide ${slide.className || ""}${slide.layout ? ` slide-layout-${slide.layout}` : ""}"`,
        `id="${slide.id}"`,
        `data-slide-id="${slide.id}"`,
        `data-index="${index}"`,
        `data-absolute-page="${slide.absolutePage || index + 1}"`
      ];
      if (slide.visiblePageNumber) attrs.push(`data-visible-page="${slide.visiblePageNumber}"`);
      if (slide.layout) attrs.push(`data-layout="${slide.layout}"`);
      return attrs.join(" ");
    }

    function renderSlideHeader(slide) {
      if (slide.noHeader) return "";
      return `
        <header class="slide-header">
          <div class="header-meta">
            ${slide.kicker ? `<div class="kicker">${slide.kicker}</div>` : ""}
            <h2 class="slide-title">${slide.title}</h2>
            ${slide.subtitle ? `<div class="slide-subtitle">${slide.subtitle}</div>` : ""}
          </div>
        </header>
      `;
    }

    function renderSlideBody(slide) {
      if (slide.noHeader) return slide.html;
      return `<div class="slide-body"><div class="body-wrap${slide.layout ? ` layout-${slide.layout}` : ""}">${slide.html}</div></div>`;
    }

    function renderSlidePagePill(slide) {
      if (slide.noPage) return "";
      return `<div class="slide-page">${slide.visiblePageLabel}</div>`;
    }

    function renderSlideMarkup(slide, index) {
      return `
        <section ${buildSlideAttributes(slide, index)}>
          ${renderSlideHeader(slide)}
          ${renderSlideBody(slide)}
          ${renderSlidePagePill(slide)}
        </section>
      `;
    }

    function renderDeck() {
      deck.innerHTML = slides.map(renderSlideMarkup).join("");
    }

    renderDeck();

    function annotateBodyLayouts() {
      document.querySelectorAll(".body-wrap").forEach((wrap) => {
        const children = Array.from(wrap.children).filter((child) => child.nodeType === 1);
        wrap.classList.toggle("is-single", children.length === 1);
        const lastChild = children[children.length - 1];
        const footerLike = lastChild && FOOTER_LIKE_CLASSES.some((className) => lastChild.classList.contains(className));
        wrap.classList.toggle("has-footer", Boolean(footerLike));
      });
    }

    annotateBodyLayouts();

    function getInitialSlide() {
      const hash = (window.location.hash || "").replace("#", "").trim();
      const params = new URLSearchParams(window.location.search);
      const queryValue = params.get("slide");
      const raw = queryValue || hash;
      return findSlideIndexByRef(raw);
    }

    let current = getInitialSlide();
    let playToken = 0;
    let pendingAdvance = null;

    function waitForAdvance(token) {
      return new Promise((resolve) => {
        if (pendingAdvance) { pendingAdvance.resolve(); }
        pendingAdvance = { resolve, token };
      });
    }

    function clearPendingAdvance() {
      if (pendingAdvance) {
        pendingAdvance.resolve();
        pendingAdvance = null;
      }
    }
    const slideEls = Array.from(document.querySelectorAll(".slide"));

    function fitDeck() {
      const shell = document.getElementById("deck-shell");
      const scaleX = window.innerWidth / 1920;
      const scaleY = window.innerHeight / 1080;
      const scale = Math.min(scaleX, scaleY);
      shell.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    function updateChrome() {
      const slide = slides[current];
      const titlePrefix = slide.visiblePageNumber
        ? String(slide.visiblePageNumber).padStart(2, "0")
        : `S${String(current + 1).padStart(2, "0")}`;
      document.title = `${titlePrefix} · ${slide.titleText || slide.id}`;
    }

    function resetLeavingSlide(slide) {
      clearPendingAdvance();
      if (!slide) return;
      slide.querySelectorAll(RENDER_RESET_SELECTOR).forEach((el) => {
        delete el.dataset.rendered;
        el.innerHTML = "";
      });
      slide.querySelectorAll(LIVE_STATE_RESET_SELECTOR).forEach((el) => {
        el.classList.remove("is-live");
      });
      slide.querySelectorAll(ROADMAP_RESET_SELECTOR).forEach((el) => el.classList.remove("is-live"));
    }

    function showSlide(index) {
      resetLeavingSlide(slideEls[current]);
      current = Math.max(0, Math.min(totalSlides - 1, index));
      playToken += 1;
      slideEls.forEach((el, i) => el.classList.toggle("is-active", i === current));
      window.history.replaceState(null, "", `#${current + 1}`);
      updateChrome();
      runAnimations(slideEls[current], playToken);
    }

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    function formatCounter(value, format, suffix) {
      if (format === "short") {
        if (value >= 10000) {
          return `${(value / 10000).toFixed(1)}万${suffix || ""}`;
        }
      }
      return `${Math.round(value).toLocaleString("zh-CN")}${suffix || ""}`;
    }

    function animateCounters(slide, token) {
      slide.querySelectorAll("[data-counter]").forEach((el) => {
        const target = Number(el.dataset.counter);
        const suffix = el.dataset.suffix || "";
        const format = el.dataset.format || "";
        const start = performance.now();
        const duration = 1300;
        function tick(now) {
          if (token !== playToken) return;
          const progress = Math.min(1, (now - start) / duration);
          const value = Math.round(target * (1 - Math.pow(1 - progress, 3)));
          el.textContent = formatCounter(value, format, progress === 1 ? suffix : "");
          if (progress < 1) {
            requestAnimationFrame(tick);
          } else {
            el.textContent = formatCounter(target, format, suffix);
          }
        }
        el.textContent = "0";
        requestAnimationFrame(tick);
      });
    }

    function renderCharts() {
      document.querySelectorAll(".bar-chart").forEach((chart) => {
        if (chart.dataset.rendered) return;
        const bars = JSON.parse(chart.dataset.bars || "[]");
        chart.innerHTML = bars.map((bar) => `
          <div class="bar-col">
            <div class="bar-value">${bar.value}${bar.suffix || ""}</div>
            <div class="bar ${bar.tone || ""}" data-height="${bar.value}" data-suffix="${bar.suffix || ""}"></div>
            <div class="bar-label">${bar.label}</div>
          </div>
        `).join("");
        chart.dataset.rendered = "1";
      });
    }

    function animateCharts(slide) {
      slide.querySelectorAll(".bar-chart").forEach((chart) => {
        const max = Number(chart.dataset.max || 100);
        chart.querySelectorAll(".bar").forEach((bar) => {
          const height = Number(bar.dataset.height || 0);
          bar.style.height = "0%";
          requestAnimationFrame(() => {
            bar.style.height = `${Math.max(8, (height / max) * 100)}%`;
          });
        });
      });
    }

    async function typeText(el, text, speed, token, onStep) {
      el.textContent = "";
      for (let i = 0; i < text.length; i += 1) {
        if (token !== playToken) return;
        el.textContent += text[i];
        if (onStep) onStep(i, text.length);
        await sleep(speed);
      }
    }

    /* ═══ Enhanced playChatDemo ═══ */

    async function playChatDemo(demo, token) {
      const messages = JSON.parse(demo.dataset.chat || "[]");
      const speed = Number(demo.dataset.speed || 20);
      demo.innerHTML = `
        <div class="chat-topbar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>

        </div>`;
      const stream = demo.querySelector(".chat-stream");
      const syncScroll = () => { stream.scrollTop = stream.scrollHeight; };

      for (const msg of messages) {
        if (token !== playToken) return;
        const bubble = document.createElement("div");
        bubble.className = `bubble ${msg.role}`;
        stream.appendChild(bubble);
        syncScroll();

        const msgType = msg.type || "text";

        switch (msgType) {

          case "text": {
            if (msg.role === "ai") {
              bubble.innerHTML = `<span class="typing"><span></span><span></span><span></span></span>`;
              syncScroll();
              await sleep(1200);
              if (token !== playToken) return;
              bubble.innerHTML = "";
              await typeText(bubble, msg.text, speed, token, syncScroll);
            } else {
              await typeText(bubble, msg.text, speed, token, syncScroll);
            }
            break;
          }

          case "file-upload": {
            bubble.classList.add("slide-in");
            bubble.innerHTML = renderFileUpload(msg);
            break;
          }

          case "file-output": {
            if (msg.role === "ai") {
              bubble.innerHTML = `<span class="typing"><span></span><span></span><span></span></span>`;
              syncScroll();
              await sleep(900);
              if (token !== playToken) return;
            }
            bubble.innerHTML = renderFileOutput(msg);
            syncScroll();
            await animateFileOutput(bubble, token);
            break;
          }

          case "image-upload": {
            bubble.classList.add("slide-in");
            bubble.innerHTML = renderImageUpload(msg);
            break;
          }

          case "image-output": {
            if (msg.role === "ai") {
              bubble.innerHTML = `<span class="typing"><span></span><span></span><span></span></span>`;
              syncScroll();
              await sleep(900);
              if (token !== playToken) return;
            }
            bubble.innerHTML = renderImageOutput(msg);
            syncScroll();
            await animateImageOutput(bubble, token);
            break;
          }

          case "code": {
            if (msg.role === "ai") {

            break;

          case "chart": {
            if (msg.role === "ai") {
              bubble.innerHTML = `<span class="typing"><span></span><span></span><span></span></span>`;
              syncScroll();
              await sleep(900);
              if (token !== playToken) return;

            syncScroll();
            await animateChart(bubble, token);

          case "table": {

              syncScroll();
              await sleep(900);
              if (token !== playToken) return;
            }
            bubble.innerHTML = renderInlineTable(msg);
            syncScroll();
            await animateTable(bubble, token);
            break;
          }

          default: {
            await typeText(bubble, msg.text || "", speed, token, syncScroll);
          }
        }

        syncScroll();
        const pauseTime = msgType === "file-upload" ? 200
          : msgType === "image-upload" ? 200

    async function playContrastDemo(root, token) {
      buildContrastDemo(root);
      const leftBubbles = root.querySelectorAll(".contrast-side.left .contrast-bubble");
      const agentInput = root.querySelector(".agent-input-row");
      const planLabel = root.querySelector(".agent-plan-label");
      const agentSteps = root.querySelectorAll(".agent-step-row");
      const agentDone = root.querySelector(".agent-done-row");
      const stats = root.querySelector(".contrast-stats");

      // Reset
      leftBubbles.forEach(b => b.classList.remove("show"));
      if (agentInput) agentInput.classList.remove("show");
      if (planLabel) planLabel.classList.remove("show");
      agentSteps.forEach(s => { s.classList.remove("active", "done"); });
      if (agentDone) agentDone.classList.remove("show");
      if (stats) stats.classList.remove("show");

      await sleep(400);

      // Phase 1: Agent input appears
      if (token !== playToken) return;
      if (agentInput) agentInput.classList.add("show");
      await sleep(500);
      if (token !== playToken) return;
      if (planLabel) planLabel.classList.add("show");
      await sleep(300);

      // Phase 2: Both sides play simultaneously
      const playLeft = async () => {
        for (const bubble of leftBubbles) {
          if (token !== playToken) return;
          bubble.classList.add("show");
          const isUser = bubble.classList.contains("user");
          await sleep(isUser ? 1100 : 1400);
        }
      };

      const playRight = async () => {
        for (let i = 0; i < agentSteps.length; i++) {
          if (token !== playToken) return;
          // Activate current step
          agentSteps.forEach(s => s.classList.remove("active"));
          agentSteps[i].classList.add("active");
          await sleep(550);
          if (token !== playToken) return;
          // Mark done
          agentSteps[i].classList.remove("active");
          agentSteps[i].classList.add("done");
          agentSteps[i].querySelector(".as-icon").textContent = "✓";
        }
        // Show done row
        await sleep(200);
        if (token !== playToken) return;
        if (agentDone) agentDone.classList.add("show");
      };

      // Start both
      await Promise.all([playLeft(), playRight()]);

      // Show stats
      await sleep(500);
      if (token !== playToken) return;
      if (stats) stats.classList.add("show");
    }

                <div class="result-item">
                  <strong>${item.title || `为什么适合试验 · ${idx + 1}`}</strong>
                  <p>${item.text || ""}</p>
                  ${item.tags && item.tags.length ? `<div class="token-row" style="margin-top:10px;">${item.tags.map((tag) => `<span class="token-chip">${tag}</span>`).join("")}</div>` : ""}
                </div>
              `;
            }).join("")}
          </div>
        </div>`;
      root.dataset.rendered = "1";
    }

    async function playSocial(root, token) {
      buildSocial(root);
      const stats = root.querySelectorAll(".flow-node");
      const arrows = root.querySelectorAll(".flow-arrow");
      const cards = root.querySelectorAll(".platform-card");
      const reasons = root.querySelectorAll(".result-item");
      for (let i = 0; i < stats.length; i += 1) {
        if (token !== playToken) return;
        stats[i].classList.add("is-live");
        if (arrows[i]) arrows[i].classList.add("is-live");
        await sleep(400);
      }
      for (const card of cards) {
        if (token !== playToken) return;
        card.classList.add("is-live");
        await sleep(220);
      }
      for (const item of reasons) {
        if (token !== playToken) return;
        item.classList.add("is-live");
        await sleep(300);
      }
    }

    function initCalc() {
      const result = document.getElementById("calcResult");
      if (!result) return;
      const inputs = document.querySelectorAll("[data-calc]");
      const update = () => {
        const values = {};
        inputs.forEach((input) => {
          values[input.dataset.calc] = Number(input.value);
          const text = input.dataset.calc === "rooms"
            ? `${input.value} 间`
            : input.dataset.calc === "rent"
              ? `${input.value} 元`
              : `${input.value}%`;
          document.querySelector(`[data-calc-value="${input.dataset.calc}"]`).textContent = text;
        });
        const income = Math.round(values.rooms * values.rent * values.occupancy / 100);
        result.textContent = income.toLocaleString("zh-CN");
      };
      inputs.forEach((input) => input.addEventListener("input", update));
      update();
    }

    function playPhotoScan(slide) {
      slide.querySelectorAll(".photo-scan").forEach((scan) => {
        scan.classList.remove("play");
        void scan.offsetHeight;
        scan.classList.add("play");
      });
    }

    function addParticles(container, count = 36) {
      if (!container || container.querySelector(".particle-field")) return;
      const field = document.createElement("div");
      field.className = "particle-field";
      for (let i = 0; i < count; i += 1) {
        const dot = document.createElement("span");
        dot.className = "particle";
        dot.style.left = `${Math.random() * 100}%`;
        dot.style.top = `${Math.random() * 100}%`;
        dot.style.background = i % 2 === 0 ? "rgba(131, 213, 248, 0.9)" : "rgba(208, 176, 127, 0.82)";
        dot.style.animationDelay = `${Math.random() * 8}s`;
        dot.style.animationDuration = `${10 + Math.random() * 8}s`;
        field.appendChild(dot);
      }
      container.appendChild(field);
    }

    async function playCover(slide, token) {
      const inner = slide.querySelector(".cover-inner");
      const title = slide.querySelector(".cover-title");
      const subtitle = slide.querySelector(".cover-subtitle");
      const time = slide.querySelector(".cover-time");
      if (!title) return;
      addParticles(inner, 50);
      if (!title.dataset.fulltext) title.dataset.fulltext = title.textContent;
      title.textContent = "";
      title.style.borderRight = "2px solid var(--gold)";
      subtitle.style.opacity = "0";
      time.style.opacity = "0";
      await typeText(title, title.dataset.fulltext, 55, token);
      if (token !== playToken) return;
      title.style.borderRight = "none";
      subtitle.style.transition = "opacity 0.5s ease";
      time.style.transition = "opacity 0.5s ease";
      subtitle.style.opacity = "1";
      await sleep(300);
      time.style.opacity = "1";
    }

    function playSection(slide) {
      const inner = slide.querySelector(".section-inner");
      addParticles(inner, 40);
    }

    async function playEnding(slide, token) {
      const quote = slide.querySelector(".ending-quote");
      if (quote && !quote.dataset.prepared) {
        const lines = quote.innerHTML.split("<br>");
        quote.innerHTML = lines.map((line) => `<span class="ending-line">${line}</span>`).join("");
        quote.dataset.prepared = "1";
      }
      slide.querySelector(".stack")?.classList && addParticles(slide.querySelector(".stack"), 30);
      const lines = slide.querySelectorAll(".ending-line");
      const actions = slide.querySelectorAll(".ending-action");
      for (let i = 0; i < lines.length; i += 1) {
        if (token !== playToken) return;
        lines[i].classList.add("is-live");
        await sleep(200);
      }
      for (let i = 0; i < actions.length; i += 1) {
        if (token !== playToken) return;
        actions[i].classList.add("is-live");
        await sleep(140);
      }
    }

    function staggerReveal(slide, selector, delay = 150) {
      const items = slide.querySelectorAll(selector);
      items.forEach((item, i) => {
        item.classList.remove("is-live");
        setTimeout(() => {
          if (item.closest(".slide")?.classList.contains("is-active")) item.classList.add("is-live");
        }, delay + i * 200);
      });
    }

    function runAnimations(slide, token) {
      animateCounters(slide, token);
      animateCharts(slide, token);
      playPhotoScan(slide);
      if (slide.classList.contains("cover-slide")) playCover(slide, token);
      if (slide.classList.contains("section-slide")) playSection(slide);
      DEMO_PLAYERS.forEach(([selector, player]) => {
        slide.querySelectorAll(selector).forEach((node) => player(node, token));
      });
      STAGGER_REVEAL_GROUPS.forEach(([selector, delay]) => {
        staggerReveal(slide, selector, delay);
      });
      const roadmap = slide.querySelector(".roadmap");
      if (roadmap) {
        roadmap.classList.add("is-live");
      }
      const slideAnimationHook = SLIDE_ANIMATION_HOOKS[slide.id];
      if (slideAnimationHook) slideAnimationHook(slide, token);
    }

    function nextSlide() {
      if (pendingAdvance && pendingAdvance.token === playToken) {
        const pa = pendingAdvance;
        pendingAdvance = null;
        pa.resolve();
        return;
      }
      showSlide(Math.min(totalSlides - 1, current + 1));
    }

    function prevSlide() {
      showSlide(Math.max(0, current - 1));
    }

    window.addEventListener("keydown", (event) => {
      if (["ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        nextSlide();
      } else if (["ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        prevSlide();
      } else if (event.key === "Home") {
        showSlide(0);
      } else if (event.key === "End") {
        showSlide(totalSlides - 1);
      }
    });

    deck.addEventListener("click", (event) => {
      const target = event.target.closest(".slide");
      if (!target) return;
      nextSlide();
    });

    renderCharts();
    fitDeck();
    initCalc();
    showSlide(current);
    window.addEventListener("resize", fitDeck);
  </script>
</body>
</html>
