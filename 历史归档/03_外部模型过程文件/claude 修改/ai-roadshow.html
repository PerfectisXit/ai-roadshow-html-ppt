<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI就在身边 | 南京城市公司AI应用分享交流会</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@600;700;900&family=Space+Grotesk:wght@500;700&display=swap");

    :root {
      --bg: #071119;
      --bg-soft: #0c1824;
      --panel: rgba(13, 24, 37, 0.82);
      --panel-strong: rgba(16, 29, 45, 0.96);
      --line: rgba(167, 190, 215, 0.16);
      --line-strong: rgba(167, 190, 215, 0.3);
      --text: #edf4fb;
      --muted: #99a9bb;
      --muted-2: #6f8194;
      --gold: #d0b07f;
      --gold-soft: rgba(208, 176, 127, 0.18);
      --cyan: #83d5f8;
      --cyan-soft: rgba(131, 213, 248, 0.16);
      --green: #7dd7ad;
      --red: #ff8b8b;
      --orange: #f5b171;
      --shadow: 0 26px 90px rgba(0, 0, 0, 0.34);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      overflow: hidden;
      font-family: "Noto Sans SC", sans-serif;
      color: var(--text);
      background: #000;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #deck-shell {
      position: fixed;
      width: 1920px;
      height: 1080px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      border-radius: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0)),
        linear-gradient(160deg, rgba(13, 26, 39, 0.98), rgba(8, 18, 28, 0.98));
      isolation: isolate;
    }

    #deck-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 84px 84px;
      opacity: 0.3;
      pointer-events: none;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.38));
    }

    #deck {
      position: absolute;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 0 26px 22px;
      opacity: 0;
      transform: translateY(20px) scale(0.99);
      pointer-events: none;
      transition: opacity 0.46s ease, transform 0.46s ease;
    }

    .slide.is-active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .slide::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 16%, rgba(131, 213, 248, 0.06), transparent 20%),
        radial-gradient(circle at 86% 82%, rgba(208, 176, 127, 0.08), transparent 22%);
      pointer-events: none;
      z-index: -1;
    }

    .slide-header {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: auto;
      padding: 16px 0 6px;
      border-bottom: none;
      flex-wrap: wrap;
    }

    .header-meta {
      max-width: 100%;
      width: 100%;
    }

    .slide-header::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, var(--line-strong), transparent 80%);
      margin-top: 6px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(208, 176, 127, 0.18);
      background: rgba(208, 176, 127, 0.08);
      color: var(--gold);
      font-size: 14px;
      letter-spacing: 0.06em;
    }

    .slide-title {
      margin: 0;
      font-family: "Noto Serif SC", serif;
      font-size: 44px;
      line-height: 1.14;
      letter-spacing: 0.02em;
      font-weight: 800;
    }

    .slide-subtitle {
      width: 100%;
      margin-top: 2px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
      max-width: 1360px;
    }

    .slide-body {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 6px;
    }

    .body-wrap {
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-height: 100%;
      gap: 18px;
    }

    .body-wrap.is-single > :first-child,
    .body-wrap.has-footer > :first-child {
      flex: 1 1 auto;
      min-height: 0;
    }

    .body-wrap.has-footer > :last-child {
      flex: 0 0 auto;
    }

    .body-wrap.layout-statement,
    .body-wrap.layout-process,
    .body-wrap.layout-demo,
    .body-wrap.layout-atlas,
    .body-wrap.layout-strategy,
    .body-wrap.layout-decision,
    .body-wrap.layout-governance {
      justify-content: stretch;
    }

    .body-wrap > .split:only-child,
    .body-wrap > .hero-grid:only-child,
    .body-wrap > .compare-grid:only-child,
    .body-wrap > .timeline:only-child,
    .body-wrap > .tool-map:only-child,
    .body-wrap > .warning-grid:only-child,
    .body-wrap > .matrix:only-child,
    .body-wrap > .roadmap:only-child {
      min-height: 100%;
      grid-template-rows: minmax(0, 1fr);
    }

    .statement-shell,
    .focus-stage,
    .scenario-board,
    .governance-board {
      min-height: 100%;
      display: grid;
      gap: 18px;
      width: 100%;
      align-items: stretch;
    }

    .statement-shell {
      grid-template-columns: 1.16fr 0.84fr;
    }

    .focus-stage {
      grid-template-columns: 1.14fr 0.86fr;
    }

    .scenario-board,
    .governance-board {
      grid-template-columns: 1.18fr 0.82fr;
    }

    .statement-main,
    .statement-side,
    .focus-main,
    .focus-side,
    .scenario-main,
    .scenario-side,
    .governance-main,
    .governance-side {
      min-height: 100%;
    }

    .statement-main {
      padding: 38px 42px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 26px;
      background:
        linear-gradient(180deg, rgba(18, 31, 46, 0.94), rgba(10, 20, 31, 0.88)),
        radial-gradient(circle at top right, rgba(131, 213, 248, 0.14), transparent 32%);
      border: 1px solid rgba(168, 193, 221, 0.12);
      border-radius: var(--radius-xl);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
    }

    .statement-main h3,
    .statement-main p {
      margin: 0;
    }

    .statement-main h3 {
      font-family: "Noto Serif SC", serif;
      font-size: 54px;
      line-height: 1.22;
    }

    .statement-main p {
      font-size: 21px;
      line-height: 1.74;
      color: rgba(237, 244, 251, 0.9);
    }

    .statement-number {
      font-family: "Space Grotesk", sans-serif;
      font-size: 132px;
      line-height: 0.9;
      letter-spacing: -0.06em;
      color: var(--gold);
    }

    .statement-label {
      color: var(--muted);
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .statement-side,
    .scenario-side,
    .governance-side {
      display: grid;
      gap: 18px;
      grid-auto-rows: minmax(0, 1fr);
    }

    .proof-card,
    .rail-card,
    .governance-card,
    .atlas-card {
      padding: 24px 26px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(18, 31, 46, 0.96), rgba(10, 20, 31, 0.9));
      border: 1px solid rgba(168, 193, 221, 0.12);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 14px;
    }

    .proof-card h3,
    .rail-card h3,
    .governance-card h3,
    .atlas-card h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.35;
    }

    .proof-card p,
    .rail-card p,
    .governance-card p,
    .atlas-card p,
    .atlas-card li {
      margin: 0;
      font-size: 17px;
      line-height: 1.68;
      color: rgba(237, 244, 251, 0.88);
    }

    .proof-card .mini-label,
    .rail-card .mini-label,
    .atlas-meta {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .focus-main,
    .scenario-main,
    .governance-main {
      display: flex;
    }

    .focus-main > *,
    .scenario-main > *,
    .governance-main > * {
      flex: 1 1 auto;
    }

    .focus-side {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 18px;
      min-height: 100%;
    }

    .focus-side .quote-card,
    .focus-side .card,
    .focus-side .table-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .focus-points {
      display: grid;
      gap: 16px;
    }

    .atlas-grid,
    .step-lane,
    .decision-conclusion,
    .scenario-rail {
      display: grid;
      gap: 16px;
      width: 100%;
    }

    .atlas-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      min-height: 100%;
    }

    .atlas-card {
      min-height: 100%;
      gap: 18px;
    }

    .atlas-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .atlas-head {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .atlas-meta strong {
      color: var(--text);
      font-size: 18px;
      display: block;
      margin-top: 4px;
    }

    .atlas-path,
    .decision-summary {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .atlas-path {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .path-node,
    .decision-chip {
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(153, 169, 187, 0.06);
      border: 1px solid rgba(153, 169, 187, 0.1);
      color: rgba(237, 244, 251, 0.9);
      font-size: 17px;
      line-height: 1.64;
    }

    .step-atlas {
      min-height: 100%;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 18px;
    }

    .step-lane {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: 1fr;
    }

    .step-node {
      padding: 24px 26px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(18, 31, 46, 0.96), rgba(10, 20, 31, 0.9));
      border: 1px solid rgba(168, 193, 221, 0.12);
      display: flex;
      flex-direction: column;
      gap: 14px;
      justify-content: space-between;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
    }

    .step-node strong {
      font-size: 24px;
      line-height: 1.35;
    }

    .step-node p {
      margin: 0;
      font-size: 17px;
      line-height: 1.66;
      color: rgba(237, 244, 251, 0.88);
    }

    .step-badge {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid rgba(208, 176, 127, 0.36);
      color: var(--gold);
      background: rgba(208, 176, 127, 0.12);
      font-family: "Space Grotesk", sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .scenario-rail,
    .decision-conclusion {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .scenario-rail .rail-card,
    .decision-conclusion .rail-card {
      min-height: 156px;
    }

    .insight-card,
    .stage-card,
    .signal-card {
      padding: 24px 26px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(18, 31, 46, 0.96), rgba(10, 20, 31, 0.9));
      border: 1px solid rgba(168, 193, 221, 0.12);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
    }

    .insight-card,
    .signal-card {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 18px;
    }

    .stage-card {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 16px;
      align-content: stretch;
      min-height: 168px;
    }

    .insight-head,
    .stage-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .insight-head h3,
    .stage-head h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.35;
    }

    .insight-kicker,
    .stage-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(131, 213, 248, 0.08);
      border: 1px solid rgba(131, 213, 248, 0.16);
      color: var(--cyan);
      font-size: 13px;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .metric-ribbon {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .metric-ribbon.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .micro-stat {
      min-height: 88px;
      padding: 12px 10px;
      border-radius: 16px;
      background: rgba(153, 169, 187, 0.06);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      text-align: center;
    }

    .micro-stat strong {
      font-family: "Space Grotesk", sans-serif;
      font-size: 30px;
      line-height: 1;
      color: var(--text);
    }

    .micro-stat span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .capability-stack {
      display: grid;
      gap: 12px;
      width: 100%;
    }

    .capability-item {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(153, 169, 187, 0.05);
      border: 1px solid rgba(153, 169, 187, 0.1);
      align-items: start;
    }

    .capability-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(208, 176, 127, 0.14);
      border: 1px solid rgba(208, 176, 127, 0.28);
      color: var(--gold);
      font-size: 20px;
    }

    .capability-copy strong {
      display: block;
      font-size: 18px;
      line-height: 1.4;
      margin-bottom: 4px;
      color: var(--text);
    }

    .capability-copy p,
    .insight-card p,
    .signal-card p,
    .stage-card p {
      margin: 0;
      font-size: 16px;
      line-height: 1.66;
      color: rgba(237, 244, 251, 0.88);
    }

    .decision-mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
    }

    .decision-mini {
      min-height: 112px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(153, 169, 187, 0.05);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .decision-mini strong {
      display: block;
      font-size: 18px;
      line-height: 1.4;
      color: var(--text);
    }

    .decision-mini span {
      color: rgba(237, 244, 251, 0.84);
      font-size: 15px;
      line-height: 1.55;
    }

    .signal-panel {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .signal-row {
      display: grid;
      grid-template-columns: 88px 1fr 52px;
      align-items: center;
      gap: 12px;
    }

    .signal-row label {
      color: rgba(237, 244, 251, 0.9);
      font-size: 15px;
      line-height: 1.5;
    }

    .signal-bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(153, 169, 187, 0.12);
      overflow: hidden;
      position: relative;
    }

    .signal-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(131, 213, 248, 0.96), rgba(208, 176, 127, 0.86));
      box-shadow: 0 0 14px rgba(131, 213, 248, 0.34);
      transition: width 1s cubic-bezier(.2, .9, .3, 1);
    }

    .slide.is-active .signal-fill {
      width: var(--fill, 72%);
    }

    .signal-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: 15px;
      color: var(--gold);
      text-align: right;
    }

    .micro-flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .micro-flow.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .micro-flow.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .flow-chip {
      min-height: 98px;
      padding: 14px 12px;
      border-radius: 16px;
      background: rgba(153, 169, 187, 0.05);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      text-align: center;
      position: relative;
    }

    .flow-chip strong {
      font-size: 17px;
      line-height: 1.4;
      color: var(--text);
    }

    .flow-chip span {
      font-size: 14px;
      line-height: 1.5;
      color: rgba(237, 244, 251, 0.82);
    }

    .flow-chip small {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .flow-chip:not(:last-child)::after {
      content: "→";
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--cyan);
      font-size: 18px;
      opacity: 0.7;
    }

    .stage-progress {
      height: 8px;
      border-radius: 999px;
      background: rgba(153, 169, 187, 0.12);
      overflow: hidden;
    }

    .stage-progress span {
      display: block;
      width: var(--fill, 100%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(131, 213, 248, 0.96), rgba(208, 176, 127, 0.86));
      opacity: 0.92;
      transform-origin: left center;
      transform: scaleX(0);
      transition: transform 1s cubic-bezier(.2, .9, .3, 1);
    }

    .slide.is-active .stage-progress span {
      transform: scaleX(1);
    }

    .stage-progress-wrap {
      display: grid;
      gap: 8px;
      width: 100%;
      margin-top: 16px;
    }

    .stage-progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: rgba(237, 244, 251, 0.72);
    }

    .stage-progress-head strong {
      color: var(--text);
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .stage-ticks {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(237, 244, 251, 0.5);
    }

    .stage-ticks span:last-child {
      text-align: right;
    }

    .feature-pair {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
    }

    .feature-box {
      min-height: 92px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(153, 169, 187, 0.05);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .feature-box strong {
      display: block;
      font-size: 17px;
      line-height: 1.4;
      color: var(--text);
    }

    .feature-box span {
      color: rgba(237, 244, 251, 0.84);
      font-size: 14px;
      line-height: 1.55;
    }

    .token-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: 100%;
    }

    .token-chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(131, 213, 248, 0.08);
      border: 1px solid rgba(131, 213, 248, 0.16);
      color: rgba(237, 244, 251, 0.9);
      font-size: 13px;
      line-height: 1.45;
    }

    .accent-line {
      position: relative;
      width: 100%;
      height: 10px;
      margin-top: 4px;
    }

    .accent-line::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 3px;
      border-radius: 999px;
      transform: translateY(-50%) scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(131, 213, 248, 0.92), rgba(208, 176, 127, 0.88));
      opacity: 0.92;

      line-height: 1.22;
    }

    .hero-stat {
      font-family: "Space Grotesk", sans-serif;
      font-size: 92px;
      line-height: 0.92;
      color: var(--gold);
      letter-spacing: -0.06em;
    }

    .note-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
    }

    .note-item {
      padding: 22px 24px;
      border-radius: 18px;
      background: rgba(153, 169, 187, 0.06);
      border: 1px solid rgba(153, 169, 187, 0.1);
      color: rgba(237, 244, 251, 0.9);
      font-size: 17px;
      line-height: 1.7;
      min-height: 132px;
    }

    .steps {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .step + .step::before {
      content: "";
      position: absolute;
      left: 23px;
      top: -16px;
      width: 2px;
      background: linear-gradient(180deg, var(--gold), transparent);
      height: 0;
      transition: height 0.3s ease;
    }

    .step {
      position: relative;
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(153, 169, 187, 0.05);
      border: 1px solid rgba(153, 169, 187, 0.1);
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
    }

    .step.is-live {
      background: rgba(131, 213, 248, 0.09);
      border-color: rgba(131, 213, 248, 0.34);
      transform: translateX(8px);
    }

    .step.is-live + .step::before {
      height: 24px;
    }

    .step-index {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: transparent;
      border: 2px solid rgba(208, 176, 127, 0.34);
      color: var(--gold);
      font-family: "Space Grotesk", sans-serif;
      font-size: 24px;
      font-weight: 700;
      transition: background 0.35s ease, border-color 0.35s ease;
    }

    .step.is-live .step-index {
      background: rgba(208, 176, 127, 0.2);
      border-color: rgba(208, 176, 127, 0.6);
    }

    .step h4 {
      margin: 0 0 4px;
      font-size: 20px;
    }

    .step p {
      margin: 0;
      font-size: 17px;
      line-height: 1.64;
      color: rgba(237, 244, 251, 0.88);
    }

    .chat-demo {
      height: 100%;
      min-height: 500px;
      border-radius: 24px;
      border: 1px solid rgba(168, 193, 221, 0.12);
      background: linear-gradient(180deg, rgba(11, 22, 33, 0.98), rgba(7, 15, 24, 0.98));
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
    }

    .chat-topbar,
    .window-topbar {
      height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(168, 193, 221, 0.08);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
    }

    .dot.red {
      background: #ff6b6b;
    }

    .dot.yellow {
      background: #ffc145;
    }

    .dot.green {
      background: #22c55e;
    }

    .chat-body {
      padding: 22px;
      height: calc(100% - 42px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-stream {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .bubble {
      max-width: 82%;
      padding: 16px 18px;
      border-radius: 18px;
      font-size: 17px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .bubble.user {
      align-self: flex-end;
      background: linear-gradient(180deg, rgba(131, 213, 248, 0.18), rgba(131, 213, 248, 0.12));
      border: 1px solid rgba(131, 213, 248, 0.16);
    }

    .bubble.ai {
      align-self: flex-start;
      background: linear-gradient(180deg, rgba(208, 176, 127, 0.16), rgba(208, 176, 127, 0.08));
      border: 1px solid rgba(208, 176, 127, 0.18);
    }

    .bubble.system {
      align-self: center;
      color: var(--muted);
      background: rgba(153, 169, 187, 0.08);
      border: 1px dashed rgba(153, 169, 187, 0.18);
      font-size: 15px;
      letter-spacing: 0.04em;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 14px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(237, 244, 251, 0.72);
      animation: blink 1.1s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.12s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.24s;
    }

    @keyframes blink {
      0%, 80%, 100% {
        opacity: 0.24;
        transform: translateY(0);
      }
      40% {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    .chat-foot {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(168, 193, 221, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 15px;
    }

    .prompt-light {
      height: 8px;
      width: 8px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 0 8px rgba(131, 213, 248, 0.08);
    }

    /* ═══ Enhanced Chat: Rich Message Types ═══ */

    /* --- file-upload / file-output card --- */
    .bubble .file-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: 12px; min-width: 220px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .bubble.user .file-card {
      background: rgba(131,213,248,0.06);
      border-color: rgba(131,213,248,0.12);
    }
    .file-card .fc-icon { flex-shrink: 0; width: 36px; height: 44px; }
    .file-card .fc-icon svg { width: 100%; height: 100%; }
    .file-card .fc-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .file-card .fc-name {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
    }
    .file-card .fc-meta { font-size: 11px; color: var(--muted); }
    .file-card .fc-check {
      margin-left: auto; width: 22px; height: 22px; border-radius: 50%;
      background: var(--green); display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0); transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .file-card .fc-check.show { opacity: 1; transform: scale(1); }
    .file-card .fc-check::after { content: "✓"; color: #fff; font-size: 12px; font-weight: 700; }

    .file-card .fc-progress { height: 3px; background: rgba(131,213,248,0.12); border-radius: 2px; overflow: hidden; margin-top: 4px; }
    .file-card .fc-progress span { display: block; height: 100%; width: 0%; background: var(--cyan); border-radius: 2px; transition: width 1.4s ease; }
    .file-card .fc-progress span.fill { width: 100%; }

    /* --- image-upload placeholder --- */
    .bubble .img-placeholder {
      width: 180px; height: 120px; border-radius: 10px; overflow: hidden;
      background: linear-gradient(135deg, rgba(131,213,248,0.08), rgba(208,176,127,0.08));
      border: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    }
    .img-placeholder .img-icon { font-size: 28px; opacity: 0.5; }
    .img-placeholder .img-label { font-size: 11px; color: var(--muted); text-align: center; padding: 0 8px; }

    /* --- image-output reveal --- */
    .bubble .img-output {
      width: 200px; height: 130px; border-radius: 10px; overflow: hidden; position: relative;
      background: linear-gradient(135deg, rgba(208,176,127,0.1), rgba(131,213,248,0.06));
      border: 1px solid rgba(255,255,255,0.06);
    }
    .img-output .img-gen-label {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--muted); transition: opacity 0.4s;
    }
    .img-output .img-gen-label.hide { opacity: 0; }
    .img-output .img-gen-result {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(131,213,248,0.15), rgba(208,176,127,0.12));
      filter: blur(16px); opacity: 0; transition: filter 1.2s ease, opacity 0.5s;
    }
    .img-output .img-gen-result.reveal { filter: blur(0); opacity: 1; }
    .img-output .img-gen-result .img-done {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--text); font-weight: 500;
    }

    /* --- code block inline --- */
    .bubble .code-block {
      border-radius: 10px; overflow: hidden; margin-top: 6px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .code-block .code-head {
      display: flex; align-items: center; gap: 8px; padding: 6px 12px;
      background: rgba(30,30,30,0.9); font-size: 11px; color: var(--muted);
    }
    .code-block .code-head .lang-tag {
      background: rgba(131,213,248,0.12); color: var(--cyan); padding: 1px 7px; border-radius: 4px; font-size: 10px;
    }
    .code-block .code-content {
      padding: 12px; background: rgba(20,20,30,0.95);
      font-family: "DM Mono", monospace; font-size: 12px; line-height: 1.7;
      color: #c9d1d9; white-space: pre-wrap; max-height: 180px; overflow-y: auto;
    }

    /* --- mini bar chart --- */
    .bubble .mini-chart {
      display: flex; align-items: flex-end; gap: 5px;
      height: 90px; padding: 10px 12px 6px;
      background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);
      margin-top: 6px;
    }
    .mini-chart .mc-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
    .mini-chart .mc-val { font-size: 9px; font-weight: 600; color: var(--text); opacity: 0; transition: opacity 0.3s ease 1.1s; }
    .mini-chart .mc-val.show { opacity: 1; }
    .mini-chart .mc-bar {
      width: 100%; max-width: 28px; border-radius: 3px 3px 0 0;
      height: 0; transition: height 1s cubic-bezier(0.22,0.61,0.36,1);
    }
    .mini-chart .mc-bar.good { background: var(--cyan); }
    .mini-chart .mc-bar.warn { background: var(--red); opacity: 0.8; }
    .mini-chart .mc-lbl { font-size: 8px; color: var(--muted); white-space: nowrap; }

    /* --- inline table --- */
    .bubble .inline-table {
      width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 12px;
    }
    .inline-table th {
      text-align: left; padding: 5px 8px; font-weight: 600; font-size: 11px;
      border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--muted);
    }
    .inline-table td {
      padding: 5px 8px; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .inline-table tr { opacity: 0; transition: opacity 0.25s ease; }
    .inline-table tr.show { opacity: 1; }
    .inline-table .cell-warn { color: var(--red); font-weight: 600; }

    /* --- slide-in animation for file/image messages --- */
    @keyframes chatSlideIn {
      from { opacity: 0; transform: translateX(16px) scale(0.96); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    .bubble.slide-in { animation: chatSlideIn 0.35s ease both; }

    /* ═══ Agent Contrast Demo ═══ */

    .contrast-demo {
      height: 100%; min-height: 440px;
      display: grid; grid-template-columns: 1fr 42px 1fr; grid-template-rows: 1fr auto;
      gap: 0; border-radius: 22px; overflow: hidden;
      border: 1px solid rgba(168,193,221,0.1);
      background: linear-gradient(180deg, rgba(11,22,33,0.96), rgba(7,15,24,0.98));
      box-shadow: 0 18px 50px rgba(0,0,0,0.2);
    }

    .contrast-side { display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
    .contrast-side.left { border-right: 1px solid rgba(168,193,221,0.06); }

    .contrast-header {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 14px; margin-bottom: 14px;
      border-bottom: 1px solid rgba(168,193,221,0.08);
    }
    .contrast-header .ch-icon {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .contrast-side.left .ch-icon { background: rgba(153,169,187,0.12); }
    .contrast-side.right .ch-icon { background: rgba(131,213,248,0.12); }
    .contrast-header .ch-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .contrast-header .ch-sub { font-size: 11px; color: var(--muted); }

    .contrast-messages {
      flex: 1; display: flex; flex-direction: column; gap: 8px;
      overflow: hidden; padding-right: 4px;
    }
    .contrast-bubble {
      padding: 9px 14px; border-radius: 14px; font-size: 13px; line-height: 1.6;
      max-width: 92%; opacity: 0; transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .contrast-bubble.show { opacity: 1; transform: translateY(0); }
    .contrast-bubble.user {
      align-self: flex-end;
      background: rgba(131,213,248,0.12); border: 1px solid rgba(131,213,248,0.1);
    }
    .contrast-bubble.ai {
      align-self: flex-start;
      background: rgba(208,176,127,0.1); border: 1px solid rgba(208,176,127,0.1);
    }

    .contrast-divider {
      display: flex; align-items: center; justify-content: center;
      background: rgba(168,193,221,0.03);
    }
    .contrast-vs {
      writing-mode: vertical-rl; font-size: 13px; font-weight: 700;
      color: var(--muted-2); letter-spacing: 4px;
    }

    /* --- Agent side: steps --- */
    .agent-input-row {
      padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.6;
      align-self: flex-end; max-width: 92%; margin-bottom: 10px;
      background: rgba(131,213,248,0.12); border: 1px solid rgba(131,213,248,0.1);
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .agent-input-row.show { opacity: 1; transform: translateY(0); }

    .agent-plan-label {
      font-size: 11px; color: var(--muted); margin-bottom: 8px;
      opacity: 0; transition: opacity 0.3s;
    }
    .agent-plan-label.show { opacity: 1; }

    .agent-step-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 12px; border-radius: 10px; font-size: 13px;
      margin-bottom: 4px; transition: all 0.35s ease;
      background: transparent; border: 1px solid transparent;
    }
    .agent-step-row .as-icon {
      width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; transition: all 0.3s;
      background: rgba(153,169,187,0.08); color: var(--muted-2);
      border: 1px solid rgba(153,169,187,0.1);
    }
    .agent-step-row .as-text { color: var(--muted); transition: color 0.3s; }

    .agent-step-row.active {
      background: rgba(131,213,248,0.06); border-color: rgba(131,213,248,0.12);
    }
    .agent-step-row.active .as-icon {
      background: rgba(131,213,248,0.15); color: var(--cyan); border-color: rgba(131,213,248,0.2);
    }
    .agent-step-row.active .as-text { color: var(--text); }

    .agent-step-row.done .as-icon {
      background: rgba(125,215,173,0.15); color: var(--green); border-color: rgba(125,215,173,0.2);
    }
    .agent-step-row.done .as-text { color: var(--muted); }

    .agent-done-row {
      margin-top: 10px; padding: 10px 14px; border-radius: 14px;
      background: rgba(125,215,173,0.08); border: 1px solid rgba(125,215,173,0.12);
      font-size: 13px; color: var(--green); font-weight: 500;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .agent-done-row.show { opacity: 1; transform: translateY(0); }

    /* --- bottom stats row --- */
    .contrast-stats {
      grid-column: 1 / -1; display: flex; align-items: center; justify-content: center;
      gap: 40px; padding: 14px 20px;
      background: rgba(255,255,255,0.02);
      border-top: 1px solid rgba(168,193,221,0.06);
      opacity: 0; transition: opacity 0.5s;
    }
    .contrast-stats.show { opacity: 1; }
    .contrast-stat-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted);
    }
    .contrast-stat-item strong { color: var(--text); font-size: 15px; }
    .contrast-stat-item .cs-highlight { color: var(--cyan); font-weight: 600; }

      grid-template-rows: auto auto auto;

    .bar-chart {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      height: 360px;
      padding: 28px 20px 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(168, 193, 221, 0.1);
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      height: 100%;
    }

    .bar {
      width: 100%;
      max-width: 94px;
      border-radius: 18px 18px 10px 10px;
      background: linear-gradient(180deg, rgba(131, 213, 248, 0.9), rgba(72, 125, 179, 0.7));
      box-shadow: 0 12px 26px rgba(72, 125, 179, 0.24);
      transition: height 1s cubic-bezier(.2, .9, .3, 1);
      height: 0;
      position: relative;
      overflow: hidden;
    }

    .bar.warn {
      background: linear-gradient(180deg, rgba(245, 177, 113, 0.95), rgba(195, 105, 65, 0.74));
      box-shadow: 0 12px 26px rgba(195, 105, 65, 0.24);
    }

    .bar.good {
      background: linear-gradient(180deg, rgba(125, 215, 173, 0.95), rgba(56, 145, 107, 0.74));
      box-shadow: 0 12px 26px rgba(56, 145, 107, 0.24);
    }

    .bar::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.24), transparent 34%);
      opacity: 0.56;
    }

    .bar-label {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      line-height: 1.4;
    }

    .bar-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
      color: var(--text);
    }

    .desktop-demo,
    .search-demo,
    .kanban-demo,
    .library-demo,
    .console-demo,
    .social-demo,
    .risk-demo {
      min-height: 460px;
      border-radius: 24px;
      border: 1px solid rgba(168, 193, 221, 0.12);
      background: linear-gradient(180deg, rgba(11, 22, 33, 0.98), rgba(7, 15, 24, 0.98));
      overflow: hidden;
      position: relative;
    }

    .desktop-main {
      display: grid;
      grid-template-columns: 0.34fr 0.66fr;
      height: calc(100% - 42px);
    }

    .desktop-side {
      padding: 20px;
      border-right: 1px solid rgba(168, 193, 221, 0.08);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .desktop-side .side-item,
    .search-source,
    .task-card,
    .library-source,
    .social-stat,
    .risk-lane {
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(153, 169, 187, 0.06);
      border: 1px solid rgba(153, 169, 187, 0.1);
      color: rgba(237, 244, 251, 0.88);
      font-size: 16px;
      line-height: 1.6;
    }

    .desktop-side .side-item.is-live,
    .search-source.is-live,
    .task-card.is-live,
    .library-source.is-live,
    .social-stat.is-live,
    .risk-lane.is-live {
      border-color: rgba(131, 213, 248, 0.35);
      background: rgba(131, 213, 248, 0.09);

    .desktop-work {
      padding: 20px;

      gap: 14px;
      grid-template-rows: auto 1fr;

    .library-answer,
    .risk-center {
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(168, 193, 221, 0.08);
      padding: 18px;
    }

    .desktop-window {
      display: grid;
      gap: 14px;
      min-height: 164px;
      align-content: start;
    }

    .desktop-window-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .desktop-stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(131, 213, 248, 0.08);
      border: 1px solid rgba(131, 213, 248, 0.16);
      color: var(--cyan);
      font-size: 13px;
      line-height: 1.4;
      letter-spacing: 0.04em;
    }

    .desktop-window-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .desktop-window-chip {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(153, 169, 187, 0.08);
      border: 1px solid rgba(153, 169, 187, 0.12);
      color: rgba(237, 244, 251, 0.84);
      font-size: 12px;
      line-height: 1.4;
    }

    .desktop-ops {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .desktop-op {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(153, 169, 187, 0.05);
      border: 1px solid rgba(153, 169, 187, 0.1);
      transition: background 0.35s ease, border-color 0.35s ease, transform 0.35s ease;
    }

    .desktop-op em {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      font-style: normal;
      font-family: "Space Grotesk", sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
      background: rgba(208, 176, 127, 0.12);
      border: 1px solid rgba(208, 176, 127, 0.24);
    }

    .desktop-op strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
      font-size: 16px;
      line-height: 1.45;
    }

    .desktop-op span,
    .desktop-op small {
      color: rgba(237, 244, 251, 0.8);
      font-size: 14px;
      line-height: 1.52;
    }

    .desktop-op small {
      grid-column: 2;
      color: var(--muted);
    }

    .desktop-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .desktop-tile {
      min-height: 138px;
      border-radius: 18px;
      padding: 16px;
      background: rgba(153, 169, 187, 0.06);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .desktop-op.is-live,
    .desktop-tile.is-live {
      border-color: rgba(131, 213, 248, 0.34);
      background: rgba(131, 213, 248, 0.09);
      transform: translateY(-2px);
    }

    .desktop-tile strong,
    .search-results strong,
    .library-answer strong,
    .risk-center strong {
      color: var(--text);
    }

    .desktop-tile span,
    .search-results p,
    .library-answer p,
    .risk-center p {
      color: rgba(237, 244, 251, 0.86);
      font-size: 16px;
      line-height: 1.58;
      margin: 0;
    }

    .desktop-cursor {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50% 50% 50% 0;
      background: var(--gold);
      transform: rotate(-45deg);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.26);
      pointer-events: none;
      transition: left 0.8s ease, top 0.8s ease;
      left: 65%;
      top: 44%;
    }

    .search-layout,
    .library-layout,
    .risk-layout {
      display: grid;
      grid-template-columns: 0.35fr 0.65fr;
      height: calc(100% - 42px);
    }

    .search-left,
    .library-left,
    .risk-left {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-right: 1px solid rgba(168, 193, 221, 0.08);
    }

    .search-right,
    .library-right,
    .risk-right {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .library-right {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      align-content: stretch;
    }

    .library-left {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      align-content: stretch;
    }

    .library-layout {
      grid-template-columns: 0.42fr 0.58fr;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 14px;
      padding: 18px;
    }

    .library-query.library-query-wide,
    .library-footprint {
      grid-column: 1 / -1;
    }

    .library-query.library-query-wide {
      min-height: 84px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 18px 20px;
    }

    .library-query-copy {
      min-width: 0;
      font-size: 17px;
      line-height: 1.58;
      color: var(--text);
    }

    .library-query-visual {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 68px;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .library-scan-track {
      position: relative;
      min-height: 54px;
      padding: 0 18px;
      border-radius: 16px;
      background: rgba(6, 16, 30, 0.68);
      border: 1px solid rgba(168, 193, 221, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      overflow: hidden;
    }

    .library-scan-track::before {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      top: 50%;
      height: 2px;
      border-radius: 999px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, rgba(131, 213, 248, 0.1), rgba(208, 176, 127, 0.18), rgba(131, 213, 248, 0.1));
    }

    .library-scan-chip {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(13, 28, 48, 0.92);
      border: 1px solid rgba(153, 169, 187, 0.16);
      color: rgba(237, 244, 251, 0.82);
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    .library-scan-chip::before {
      content: "";
      width: 7px;
      height: 7px;
      margin-right: 7px;
      border-radius: 50%;
      background: rgba(131, 213, 248, 0.52);
      box-shadow: 0 0 8px rgba(131, 213, 248, 0.28);
    }

    .library-lens {
      position: absolute;
      top: 50%;
      left: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(131, 213, 248, 0.88);
      background: radial-gradient(circle, rgba(131, 213, 248, 0.18), rgba(131, 213, 248, 0.03));
      box-shadow: 0 0 18px rgba(131, 213, 248, 0.18);
      transform: translateY(-50%);
      z-index: 2;
    }

    .library-lens::after {
      content: "";
      position: absolute;
      right: -8px;
      bottom: -7px;
      width: 14px;
      height: 3px;
      border-radius: 999px;
      background: rgba(131, 213, 248, 0.88);
      transform: rotate(40deg);
      transform-origin: left center;
    }

    .slide.is-active .library-lens {
      animation: scanLens 5.2s cubic-bezier(.35, .08, .2, .98) infinite;
    }

    .slide.is-active .library-scan-chip:nth-child(1) {
      animation: scanPulse 5.2s ease-in-out infinite;
    }

    .slide.is-active .library-scan-chip:nth-child(2) {
      animation: scanPulse 5.2s ease-in-out 0.9s infinite;
    }

    .slide.is-active .library-scan-chip:nth-child(3) {
      animation: scanPulse 5.2s ease-in-out 1.8s infinite;
    }

    .slide.is-active .library-scan-chip:nth-child(4) {
      animation: scanPulse 5.2s ease-in-out 2.7s infinite;
    }

    .library-query-radar {
      position: relative;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      justify-self: end;
      border: 1px solid rgba(131, 213, 248, 0.22);
      background: radial-gradient(circle, rgba(131, 213, 248, 0.16), rgba(131, 213, 248, 0.03) 60%, transparent 62%);
      overflow: hidden;
    }

    .library-query-radar::before,
    .library-query-radar::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(131, 213, 248, 0.18);
    }

    .library-query-radar::after {
      inset: 18px;
    }

    .library-query-radar span {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 210deg, transparent 0deg, transparent 290deg, rgba(131, 213, 248, 0.42) 332deg, rgba(131, 213, 248, 0.04) 360deg);
      animation: radarSweep 2.8s linear infinite;
    }

    .library-panel {
      min-height: 0;
      padding: 16px;
      border-radius: 20px;
      background: rgba(7, 18, 33, 0.78);
      border: 1px solid rgba(168, 193, 221, 0.08);
      display: grid;
      gap: 14px;
    }

    .library-sources-panel {
      grid-template-rows: auto minmax(0, 1fr);
    }

    .library-answer-panel {
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .library-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 2px;
    }

    .library-panel-head strong {
      font-size: 15px;
      line-height: 1.4;
      color: rgba(237, 244, 251, 0.9);
      letter-spacing: 0.06em;
    }

    .library-panel-head span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(131, 213, 248, 0.1);
      border: 1px solid rgba(131, 213, 248, 0.2);
      color: var(--cyan);
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.04em;
    }

    .risk-layout {
      grid-template-columns: 0.42fr 0.58fr;
    }

    .risk-left {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      align-content: stretch;
    }

    .risk-right {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      align-content: stretch;
    }

    .search-query,
    .library-query {
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(131, 213, 248, 0.08);
      border: 1px solid rgba(131, 213, 248, 0.18);
      color: var(--text);
      font-size: 16px;
      line-height: 1.58;
      min-height: 88px;
    }

    .result-item,
    .answer-line {
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(153, 169, 187, 0.05);
      border: 1px solid rgba(153, 169, 187, 0.1);
      color: rgba(237, 244, 251, 0.88);
      font-size: 16px;
      line-height: 1.58;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease, border-color 0.35s ease, background 0.35s ease;
    }

    .result-item.is-live,
    .answer-line.is-live {
      opacity: 1;
      transform: translateY(0);
    }

    .library-answer {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: transparent;
      border: none;
      padding: 0;
      min-height: 0;
    }

    .library-source-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
    }

    .library-source {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      align-content: start;
      gap: 8px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(153, 169, 187, 0.05);
      border: 1px solid rgba(153, 169, 187, 0.1);
      opacity: 0.32;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .library-source::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 50%;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(131, 213, 248, 0.8), transparent);
      transform: translateY(-50%) scaleX(0);
      transform-origin: left center;
      opacity: 0;
    }

    .library-source strong {
      display: block;
      font-size: 14px;
      line-height: 1.3;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .library-source span {
      display: block;
      font-size: 17px;
      line-height: 1.5;
      color: rgba(237, 244, 251, 0.92);
    }

    .library-source-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
      padding-top: 2px;
    }

    .library-meta-chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(131, 213, 248, 0.08);
      border: 1px solid rgba(131, 213, 248, 0.16);
      color: rgba(237, 244, 251, 0.78);
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    .library-source.is-live {
      opacity: 1;
      transform: translateY(0);
      border-color: rgba(131, 213, 248, 0.22);
      box-shadow: 0 0 18px rgba(131, 213, 248, 0.12);
    }

    .slide.is-active .library-source.is-live::after {
      opacity: 0.92;
      animation: sourceScan 1.1s ease-out both;
    }

    .library-answer-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .library-hit {
      min-height: 90px;
      padding: 14px 14px 12px;
      border-radius: 16px;
      background: rgba(153, 169, 187, 0.05);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .library-hit strong {
      display: block;
      font-size: 16px;
      line-height: 1.35;
      color: var(--text);
    }

    .library-hit span {
      display: block;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(237, 244, 251, 0.78);
    }

    .library-answer-route {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .library-route-chip {
      position: relative;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(153, 169, 187, 0.06);
      border: 1px solid rgba(153, 169, 187, 0.12);
      display: inline-flex;
      align-items: center;
      color: rgba(237, 244, 251, 0.82);
      font-size: 13px;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    .library-route-chip:not(:last-child)::after {
      content: "→";
      margin-left: 10px;
      color: var(--cyan);
      opacity: 0.72;
    }

    @keyframes scanLens {
      0% { left: 18px; }
      18% { left: 22%; }
      42% { left: 44%; }
      66% { left: 63%; }
      86% { left: calc(100% - 58px); }
      100% { left: calc(100% - 58px); }
    }

    @keyframes scanPulse {
      0%, 100% {
        border-color: rgba(153, 169, 187, 0.16);
        box-shadow: none;
      }
      18%, 30% {
        border-color: rgba(131, 213, 248, 0.3);
        box-shadow: 0 0 14px rgba(131, 213, 248, 0.12);
      }
    }

    @keyframes radarSweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes sourceScan {
      0% {
        transform: translateY(-50%) scaleX(0.12);
        opacity: 0;
      }
      35% {
        transform: translateY(-50%) scaleX(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-50%) scaleX(1);
        opacity: 0;
      }
    }

    .library-answer .bubble.ai {
      max-width: 100%;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      min-height: 100%;
    }

    .library-answer .bubble.ai.is-live {
      opacity: 1;
      transform: translateY(0);
    }

    .answer-line.is-live {
      border-color: rgba(131, 213, 248, 0.34);
      background: rgba(131, 213, 248, 0.08);
    }

    #s16 .compare-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .library-answer {
      min-height: 0;
      display: flex;
    }

    .library-footprint,
    .risk-summary-grid {
      display: grid;
      gap: 12px;
      width: 100%;
    }

    .library-footprint {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .risk-summary-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .library-note,
    .risk-summary-card {
      min-height: 106px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(153, 169, 187, 0.05);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .library-note strong,
    .risk-summary-card strong {
      display: block;
      font-size: 17px;
      line-height: 1.4;
      color: var(--text);
    }

    .library-note span,
    .risk-summary-card span {
      display: block;
      font-size: 14px;
      line-height: 1.52;
      color: rgba(237, 244, 251, 0.84);
    }

    .library-note em {
      display: inline-block;
      font-style: normal;
      font-size: 12px;
      line-height: 1;
      color: var(--cyan);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .risk-lane {
      min-height: 0;
      display: flex;
      align-items: center;
    }

    .risk-center {
      display: grid;
      align-content: start;
      gap: 12px;
      min-height: 0;
    }

    .risk-center p.live {
      color: var(--text);
    }

    .flow-chain {
      display: grid;
      grid-template-columns: repeat(11, auto);
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(168, 193, 221, 0.08);
    }

    .flow-node {
      width: 158px;
      min-height: 148px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(153, 169, 187, 0.06);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      text-align: center;
      opacity: 0.2;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
    }

    .flow-node.is-live {
      opacity: 1;
      transform: translateY(0);
      box-shadow: 0 0 20px rgba(131, 213, 248, 0.3);
      border-color: rgba(131, 213, 248, 0.4);
    }

    .flow-icon {
      font-size: 30px;
    }

    .flow-label {
      font-size: 16px;
      line-height: 1.55;
      color: rgba(237, 244, 251, 0.9);
    }

    .flow-arrow {
      color: rgba(153, 169, 187, 0.3);
      font-size: 28px;
      transition: color 0.4s ease;
    }

    .flow-arrow.is-live {
      color: var(--cyan);
    }

    .deployment-stage {
      min-height: 100%;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 16px;
    }

    .deployment-shell {
      padding: 24px 26px;
      border-radius: 24px;
      background:
        radial-gradient(circle at top right, rgba(125, 215, 173, 0.12), transparent 30%),
        linear-gradient(180deg, rgba(11, 24, 36, 0.98), rgba(7, 15, 24, 0.98));
      border: 1px solid rgba(125, 215, 173, 0.18);
      display: grid;
      gap: 18px;
      min-height: 0;
    }

    .deployment-badge-row,
    .deployment-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .deployment-chip,
    .security-chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(125, 215, 173, 0.1);
      border: 1px solid rgba(125, 215, 173, 0.18);
      color: rgba(237, 244, 251, 0.86);
      font-size: 13px;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    .deployment-flow {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: stretch;
      gap: 16px;
      padding-top: 18px;
    }

    .deployment-flow::before {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      top: 30px;
      height: 2px;
      background: linear-gradient(90deg, rgba(125, 215, 173, 0.16), rgba(125, 215, 173, 0.7), rgba(125, 215, 173, 0.16));
    }

    .deployment-flow::after {
      content: "";
      position: absolute;
      top: 26px;
      left: 8%;
      width: 18%;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(125, 215, 173, 0), rgba(125, 215, 173, 0.95), rgba(125, 215, 173, 0));
      filter: blur(4px);
      opacity: 0;
    }

    .slide.is-active .deployment-flow::after {
      opacity: 0.9;
      animation: deploymentPulse 4.2s ease-in-out infinite;
    }

    .deployment-node {
      position: relative;
      min-height: 192px;
      min-width: 0;
      padding: 48px 18px 18px;
      border-radius: 20px;
      background: rgba(153, 169, 187, 0.06);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 12px;
      text-align: left;
      overflow: hidden;

    .deployment-node::before {
      content: attr(data-step);
      position: absolute;
      top: 14px;
      left: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(125, 215, 173, 0.12);
      border: 1px solid rgba(125, 215, 173, 0.22);
      color: rgba(237, 244, 251, 0.86);
      font-family: "Space Grotesk", sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .deployment-node::after {
      content: "";
      position: absolute;
      top: 23px;
      left: calc(50% - 5px);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(125, 215, 173, 0.9);
      box-shadow: 0 0 0 0 rgba(125, 215, 173, 0.36);
    }

    .slide.is-active .deployment-node::after {
      animation: deploymentDot 2.4s ease-in-out infinite;
    }

    .deployment-node strong {
      display: block;
      font-size: 20px;
      line-height: 1.35;
      color: var(--text);
    }

    .deployment-node span {
      display: block;
      font-size: 15px;
      line-height: 1.58;
      color: rgba(237, 244, 251, 0.82);
    }

    .deployment-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(168, 193, 221, 0.1);
      color: rgba(237, 244, 251, 0.78);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .deployment-status b {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(125, 215, 173, 0.95);
      box-shadow: 0 0 0 0 rgba(125, 215, 173, 0.4);
      display: block;
    }

    .slide.is-active .deployment-status b {
      animation: deploymentDot 2.1s ease-in-out infinite;
    }

    .deployment-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
    }

    .deployment-meta span {

      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(125, 215, 173, 0.08);
      border: 1px solid rgba(125, 215, 173, 0.16);
      color: rgba(237, 244, 251, 0.78);
      font-size: 12px;
      line-height: 1;

    .deployment-arrow {
      color: rgba(125, 215, 173, 0.68);

      text-align: center;
    }

    .deployment-compare {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .deployment-compare-card {
      min-height: 150px;
      padding: 18px 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(168, 193, 221, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .deployment-compare-card strong {
      display: block;
      font-size: 20px;
      line-height: 1.38;
      color: var(--text);
    }

    .deployment-compare-card p {
      margin: 0;
      font-size: 15px;
      line-height: 1.58;
      color: rgba(237, 244, 251, 0.84);
    }

      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(440%);
      }
    }

    @keyframes deploymentDot {

    }

    .risk-sheet,
    .risk-analysis-log {
      min-height: 0;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(168, 193, 221, 0.08);
    }

    .risk-sheet {
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .risk-sheet-title,
    .risk-log-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: rgba(237, 244, 251, 0.9);

      letter-spacing: 0.04em;
    }

    .risk-sheet-line {
      padding: 14px 15px;
      border-radius: 14px;

      line-height: 1.56;

    }

      padding: 14px 16px;

    .risk-lane-head span {

      font-size: 14px;
      line-height: 1.56;
      color: rgba(237, 244, 251, 0.8);

      color: rgba(237, 244, 251, 0.78);
      font-size: 12px;
      line-height: 1;

      left: 16px;

      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(131, 213, 248, 0.86);
      background: radial-gradient(circle, rgba(131, 213, 248, 0.18), rgba(131, 213, 248, 0.03));

      gap: 12px;

      20%,
      80% {
        opacity: 0.5;

      100% {
        transform: translate3d(18px, -24px, 0);
        opacity: 0;
      }

      border-radius: 22px;
      padding: 24px 26px;
      background: linear-gradient(180deg, rgba(255, 139, 139, 0.06), rgba(10, 20, 31, 0.9));
      border: 1px solid rgba(255, 139, 139, 0.16);
      border-left: 4px solid var(--red);
      border-radius: 4px 22px 22px 4px;
      min-height: 320px;
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .warning-card.is-live {
      opacity: 1;
      transform: translateX(0);
    }

    .warning-card::before {
      content: "⚠ 警示";
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 139, 139, 0.15);
      color: var(--red);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .warning-card h3 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .warning-card p {
      margin: 0;
      font-size: 17px;
      line-height: 1.66;
      color: rgba(237, 244, 251, 0.88);
    }

    .warning-card .mini-pill {
      margin-bottom: 12px;
    }

    .warning-probe {
      display: grid;
      gap: 10px;
      width: 100%;
      margin-top: 16px;
    }

    .warning-probe-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .probe-node {
      position: relative;
      min-height: 76px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 139, 139, 0.16);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .probe-node::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, transparent 10%, rgba(255, 255, 255, 0.18) 45%, transparent 80%);
      transform: translateX(-140%);
      animation: probeSweep 3.2s ease-in-out infinite;
    }

    .probe-node strong,
    .probe-node span {
      position: relative;
      z-index: 1;
    }

    .probe-node strong {
      font-size: 14px;
      line-height: 1.4;
      color: var(--text);
    }

    .probe-node span {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .probe-node.is-cyan {
      border-color: rgba(131, 213, 248, 0.2);
    }

    .probe-node.is-gold {
      border-color: rgba(208, 176, 127, 0.24);
    }

    @keyframes probeSweep {
      0% {
        transform: translateX(-140%);
      }
      55% {
        transform: translateX(140%);
      }
      100% {
        transform: translateX(140%);
      }
    }

    .redline-grid {
      display: grid;
      gap: 16px;
      width: 100%;
    }

    .redline-grid.redline-grid-quad {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .redline {
      display: grid;
      grid-template-columns: 116px 1fr 110px;
      gap: 20px;
      align-items: stretch;
      padding: 18px 20px;
      border-radius: 20px;
      background:
        linear-gradient(90deg, rgba(255, 139, 139, 0.18), rgba(255, 139, 139, 0.02) 28%),
        rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 139, 139, 0.22);
      opacity: 0;
      transform: translateX(-30px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .redline.is-live {
      opacity: 1;
      transform: translateX(0);
    }

    .redline::after {
      content: "✗ 禁止";
      align-self: center;
      justify-self: end;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 139, 139, 0.12);
      border: 1px solid rgba(255, 139, 139, 0.24);
      color: #ffd8d8;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .redline-index {
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-family: "Space Grotesk", sans-serif;
      font-size: 30px;
      color: #ffd4d4;
      background: rgba(255, 139, 139, 0.15);
    }

    .redline-grid-quad .redline {
      position: relative;
      grid-template-columns: 92px 1fr;
      padding: 18px 110px 18px 18px;
      min-height: 214px;
    }

    .redline-grid-quad .redline::after {
      position: absolute;
      top: 16px;
      right: 16px;
      align-self: auto;
      justify-self: auto;
    }

    .redline-main {
      display: grid;
      gap: 12px;
      align-content: center;
    }

    .redline-main h3 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.35;
    }

    .redline-main p {
      margin: 0;
      font-size: 16px;
      line-height: 1.58;
      color: rgba(237, 244, 251, 0.86);
    }

    .redline-cases {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .redline-case {
      min-height: 86px;
      padding: 12px 14px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 6px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(153, 169, 187, 0.12);
    }

    .redline-case.safe {
      border-color: rgba(131, 213, 248, 0.18);
      background: rgba(131, 213, 248, 0.06);
    }

    .redline-case.risk {
      border-color: rgba(255, 139, 139, 0.2);
      background: rgba(255, 139, 139, 0.06);
    }

    .redline-case label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .redline-case strong {
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
    }

    .redline-case span {
      font-size: 12px;
      line-height: 1.45;
      color: rgba(237, 244, 251, 0.76);
    }

    .roadmap {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
      padding-top: 26px;
      align-content: stretch;
      grid-auto-rows: 1fr;
    }

    .roadmap::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 16.5%;
      height: 2px;
      width: 0;
      background: linear-gradient(90deg, var(--cyan), var(--gold));
      transition: width 1.2s ease;
    }

    .roadmap.is-live::before {
      width: 67%;
    }

    .roadmap-card h3 {
      font-size: 25px;
    }

    .roadmap-card {
      position: relative;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      min-height: 320px;
    }

    .roadmap-card::before {
      content: "";
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px rgba(131, 213, 248, 0.5);
    }

    .roadmap-card.is-live {
      opacity: 1;
      transform: translateY(0);
    }

    .roadmap-stage {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(131, 213, 248, 0.08);

    .ending-actions {

      line-height: 1.64;
      color: rgba(237, 244, 251, 0.9);
      opacity: 0;
      transform: translateY(30px);

    /* ─── s05: Voice Chat Page ───────────────────────────────────── */

    /* Two-column layout: [info left] [chat + fuse right] */
    #s05 .vcs-stage {
      display: grid;
      grid-template-columns: 440px 1fr;
      gap: 20px;
      height: 100%;
      min-height: 0;
    }
    #s05 .vcs-left {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }
    #s05 .vcs-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 20px 22px;
      border-radius: 18px;
      min-height: 0;
    }
    #s05 .vcs-card h3 {
      margin: 0;
      font-family: "Lora", "Noto Serif SC", serif;
      font-size: 21px;
      font-weight: 600;
      line-height: 1.3;
      color: #1a1714;
    }
    #s05 .vcs-card p {
      font-size: 15.5px;
      line-height: 1.68;
      color: #6b6055;
      margin: 0;
      flex: 1;
    }
    #s05 .vcs-right {
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
      min-height: 0;
    }
    /* Chat window hidden initially; revealed on click 1 */
    #s05 .voice-chat-win {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      pointer-events: none;
      min-height: 0;
    }
    #s05 .voice-chat-win.is-live {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    /* Fuse card hidden initially; revealed on click 2, dramatically */
    #s05 .fuse-card {
      opacity: 0;
      transform: translateY(8px) scale(0.97);
      transition: opacity 0.5s cubic-bezier(.15,.85,.25,1), transform 0.5s cubic-bezier(.15,.85,.25,1);
      background: linear-gradient(135deg, #fff8f4, #fff4ec);
      border: 2px solid rgba(201, 104, 66, 0.5);
      border-radius: 14px;
      padding: 20px 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35em;
      flex-wrap: wrap;
      font-family: "Lora", "Noto Serif SC", serif;
      font-size: 24px;
      line-height: 1.5;
      color: #1a1714;
      text-align: center;
    }
    #s05 .fuse-card.is-live {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    #s05 .fuse-card strong {
      color: #c96842;
      font-size: 1.05em;
    }
