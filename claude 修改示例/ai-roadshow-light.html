<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI就在身边 | 南京城市公司AI应用分享交流会</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@600;700;900&family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap");

    :root {
      --bg: #FAF8F4;
      --bg-soft: #F5F1EB;
      --panel: rgba(255,255,255,0.92);
      --panel-strong: rgba(255,255,255,0.97);
      --line: rgba(26,23,20,0.10);
      --line-strong: rgba(26,23,20,0.18);
      --text: #1A1714;
      --muted: #7A6E65;
      --muted-2: #A09589;
      --gold: #C96842;
      --gold-soft: rgba(201,104,66,0.12);
      --cyan: #3D6E9B;
      --cyan-soft: rgba(61,110,155,0.10);
      --green: #2E7D52;
      --red: #D44235;
      --orange: #E08560;
      --shadow: 0 6px 24px rgba(26,23,20,0.09);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      overflow: hidden;
      font-family: "Noto Sans SC", sans-serif;
      color: var(--text);
      background: #D8D3C9;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #deck-shell {
      position: fixed;
      width: 1920px;
      height: 1080px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      border-radius: 0;
      overflow: hidden;
      background: #FAF8F4;
      isolation: isolate;
    }

    #deck-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 84px 84px;
      opacity: 0.3;
      pointer-events: none;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.38));
    }

    #deck {
      position: absolute;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 0 26px 22px;
      opacity: 0;
      transform: translateY(20px) scale(0.99);
      pointer-events: none;
      transition: opacity 0.46s ease, transform 0.46s ease;
    }

    .slide.is-active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .slide::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 16%, rgba(201,104,66,0.05), transparent 20%),
        radial-gradient(circle at 86% 82%, rgba(201,104,66,0.04), transparent 22%);
      pointer-events: none;
      z-index: -1;
    }

    .slide-header {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: auto;
      padding: 16px 0 6px;
      border-bottom: none;
      flex-wrap: wrap;
    }

    .header-meta {
      max-width: 100%;
      width: 100%;
    }

    .slide-header::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, var(--line-strong), transparent 80%);
      margin-top: 6px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(201,104,66,0.18);
      background: rgba(208, 176, 127, 0.08);
      color: var(--gold);
      font-size: 14px;
      letter-spacing: 0.06em;
    }

    .slide-title {
      margin: 0;
      font-family: "Noto Serif SC","Lora",serif;
      font-size: 44px;
      line-height: 1.14;
      letter-spacing: 0.02em;
      font-weight: 800;
    }

    .slide-subtitle {
      width: 100%;
      margin-top: 2px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
      max-width: 1360px;
    }

    .slide-body {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 6px;
    }

    .body-wrap {
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-height: 100%;
      gap: 18px;
    }

    .body-wrap.is-single > :first-child,
    .body-wrap.has-footer > :first-child {
      flex: 1 1 auto;
      min-height: 0;
    }

    .body-wrap.has-footer > :last-child {
      flex: 0 0 auto;
    }

    .body-wrap.layout-statement,
    .body-wrap.layout-process,
    .body-wrap.layout-demo,
    .body-wrap.layout-atlas,
    .body-wrap.layout-strategy,
    .body-wrap.layout-decision,
    .body-wrap.layout-governance {
      justify-content: stretch;
    }

    .body-wrap > .split:only-child,
    .body-wrap > .hero-grid:only-child,
    .body-wrap > .compare-grid:only-child,
    .body-wrap > .timeline:only-child,
    .body-wrap > .tool-map:only-child,
    .body-wrap > .warning-grid:only-child,
    .body-wrap > .matrix:only-child,
    .body-wrap > .roadmap:only-child {
      min-height: 100%;
      grid-template-rows: minmax(0, 1fr);
    }

    .statement-shell,
    .focus-stage,
    .scenario-board,
    .governance-board {
      min-height: 100%;
      display: grid;
      gap: 18px;
      width: 100%;
      align-items: stretch;
    }

    .statement-shell {
      grid-template-columns: 1.16fr 0.84fr;
    }

    .focus-stage {
      grid-template-columns: 1.14fr 0.86fr;
    }

    .scenario-board,
    .governance-board {
      grid-template-columns: 1.18fr 0.82fr;
    }

    .statement-main,
    .statement-side,
    .focus-main,
    .focus-side,
    .scenario-main,
    .scenario-side,
    .governance-main,
    .governance-side {
      min-height: 100%;
    }

    .statement-main {
      padding: 38px 42px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 26px;
      background:
        linear-gradient(180deg, #FFFFFF, #FAF8F4),
        radial-gradient(circle at top right, rgba(201,104,66,0.06), transparent 32%);
      border: 1px solid rgba(26,23,20,0.09);
      border-radius: var(--radius-xl);
      box-shadow: 0 2px 10px rgba(26,23,20,0.07), 0 1px 3px rgba(26,23,20,0.04);
    }

    .statement-main h3,
    .statement-main p {
      margin: 0;
    }

    .statement-main h3 {
      font-family: "Noto Serif SC","Lora",serif;
      font-size: 54px;
      line-height: 1.22;
    }

    .statement-main p {
      font-size: 21px;
      line-height: 1.74;
      color: rgba(26,23,20,0.88);
    }

    .statement-number {
      font-family: "DM Sans",sans-serif;
      font-size: 132px;
      line-height: 0.9;
      letter-spacing: -0.06em;
      color: var(--gold);
    }

    .statement-label {
      color: var(--muted);
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .statement-side,
    .scenario-side,
    .governance-side {
      display: grid;
      gap: 18px;
      grid-auto-rows: minmax(0, 1fr);
    }

    .proof-card,
    .rail-card,
    .governance-card,
    .atlas-card {
      padding: 24px 26px;
      border-radius: 22px;
      background: #FFFFFF;
      border: 1px solid rgba(26,23,20,0.09);
      box-shadow: 0 2px 10px rgba(26,23,20,0.07), 0 1px 3px rgba(26,23,20,0.04);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 14px;
    }

    .proof-card h3,
    .rail-card h3,
    .governance-card h3,
    .atlas-card h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.35;
    }

    .proof-card p,
    .rail-card p,
    .governance-card p,
    .atlas-card p,
    .atlas-card li {
      margin: 0;
      font-size: 17px;
      line-height: 1.68;
      color: rgba(26,23,20,0.84);
    }

    .proof-card .mini-label,
    .rail-card .mini-label,
    .atlas-meta {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .focus-main,
    .scenario-main,
    .governance-main {
      display: flex;
    }

    .focus-main > *,
    .scenario-main > *,
    .governance-main > * {
      flex: 1 1 auto;
    }

    .focus-side {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 18px;
      min-height: 100%;
    }

    .focus-side .quote-card,
    .focus-side .card,
    .focus-side .table-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .focus-points {
      display: grid;
      gap: 16px;
    }

    .atlas-grid,
    .step-lane,
    .decision-conclusion,
    .scenario-rail {
      display: grid;
      gap: 16px;
      width: 100%;
    }

    .atlas-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      min-height: 100%;
    }

    .atlas-card {
      min-height: 100%;
      gap: 18px;
    }

    .atlas-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .atlas-head {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .atlas-meta strong {
      color: var(--text);
      font-size: 18px;
      display: block;
      margin-top: 4px;
    }

    .atlas-path,
    .decision-summary {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .atlas-path {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .path-node,
    .decision-chip {
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(26,23,20,0.035);
      border: 1px solid rgba(153, 169, 187, 0.1);
      color: rgba(26,23,20,0.88);
      font-size: 17px;
      line-height: 1.64;
    }

    .step-atlas {
      min-height: 100%;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 18px;
    }

    .step-lane {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: 1fr;
    }

    .step-node {
      padding: 24px 26px;
      border-radius: 22px;
      background: #FFFFFF;
      border: 1px solid rgba(26,23,20,0.09);
      display: flex;
      flex-direction: column;
      gap: 14px;
      justify-content: space-between;
      box-shadow: 0 2px 10px rgba(26,23,20,0.07), 0 1px 3px rgba(26,23,20,0.04);
    }

    .step-node strong {
      font-size: 24px;
      line-height: 1.35;
    }

    .step-node p {
      margin: 0;
      font-size: 17px;
      line-height: 1.66;
      color: rgba(26,23,20,0.84);
    }

    .step-badge {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid rgba(201,104,66,0.28);
      color: var(--gold);
      background: rgba(208, 176, 127, 0.12);
      font-family: "DM Sans",sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .scenario-rail,
    .decision-conclusion {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .scenario-rail .rail-card,
    .decision-conclusion .rail-card {
      min-height: 156px;
    }

    .insight-card,
    .stage-card,
    .signal-card {
      padding: 24px 26px;
      border-radius: 22px;
      background: #FFFFFF;
      border: 1px solid rgba(26,23,20,0.09);
      box-shadow: 0 2px 10px rgba(26,23,20,0.07), 0 1px 3px rgba(26,23,20,0.04);
    }

    .insight-card,
    .signal-card {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 18px;
    }

    .stage-card {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 16px;
      align-content: stretch;
      min-height: 168px;
    }

    .insight-head,
    .stage-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .insight-head h3,
    .stage-head h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.35;
    }

    .insight-kicker,
    .stage-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(201,104,66,0.05);
      border: 1px solid rgba(201,104,66,0.15);
      color: var(--gold);
      font-size: 13px;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .metric-ribbon {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .metric-ribbon.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .micro-stat {
      min-height: 88px;
      padding: 12px 10px;
      border-radius: 16px;
      background: rgba(26,23,20,0.035);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      text-align: center;
    }

    .micro-stat strong {
      font-family: "DM Sans",sans-serif;
      font-size: 30px;
      line-height: 1;
      color: var(--text);
    }

    .micro-stat span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .capability-stack {
      display: grid;
      gap: 12px;
      width: 100%;
    }

    .capability-item {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      align-items: start;
    }

    .capability-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(208, 176, 127, 0.14);
      border: 1px solid rgba(208, 176, 127, 0.28);
      color: var(--gold);
      font-size: 20px;
    }

    .capability-copy strong {
      display: block;
      font-size: 18px;
      line-height: 1.4;
      margin-bottom: 4px;
      color: var(--text);
    }

    .capability-copy p,
    .insight-card p,
    .signal-card p,
    .stage-card p {
      margin: 0;
      font-size: 16px;
      line-height: 1.66;
      color: rgba(26,23,20,0.84);
    }

    .decision-mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
    }

    .decision-mini {
      min-height: 112px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .decision-mini strong {
      display: block;
      font-size: 18px;
      line-height: 1.4;
      color: var(--text);
    }

    .decision-mini span {
      color: rgba(26,23,20,0.76);
      font-size: 15px;
      line-height: 1.55;
    }

    .signal-panel {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .signal-row {
      display: grid;
      grid-template-columns: 88px 1fr 52px;
      align-items: center;
      gap: 12px;
    }

    .signal-row label {
      color: rgba(26,23,20,0.88);
      font-size: 15px;
      line-height: 1.5;
    }

    .signal-bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(153, 169, 187, 0.12);
      overflow: hidden;
      position: relative;
    }

    .signal-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), rgba(201,104,66,0.55));
      box-shadow: 0 0 10px rgba(201,104,66,0.18);
      transition: width 1s cubic-bezier(.2, .9, .3, 1);
    }

    .slide.is-active .signal-fill {
      width: var(--fill, 72%);
    }

    .signal-value {
      font-family: "DM Sans",sans-serif;
      font-size: 15px;
      color: var(--gold);
      text-align: right;
    }

    .micro-flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .micro-flow.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .micro-flow.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .flow-chip {
      min-height: 98px;
      padding: 14px 12px;
      border-radius: 16px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      text-align: center;
      position: relative;
    }

    .flow-chip strong {
      font-size: 17px;
      line-height: 1.4;
      color: var(--text);
    }

    .flow-chip span {
      font-size: 14px;
      line-height: 1.5;
      color: rgba(26,23,20,0.74);
    }

    .flow-chip small {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .flow-chip:not(:last-child)::after {
      content: "→";
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 18px;
      opacity: 0.7;
    }

    .stage-progress {
      height: 8px;
      border-radius: 999px;
      background: rgba(153, 169, 187, 0.12);
      overflow: hidden;
    }

    .stage-progress span {
      display: block;
      width: var(--fill, 100%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), rgba(201,104,66,0.55));
      opacity: 0.92;
      transform-origin: left center;
      transform: scaleX(0);
      transition: transform 1s cubic-bezier(.2, .9, .3, 1);
    }

    .slide.is-active .stage-progress span {
      transform: scaleX(1);
    }

    .stage-progress-wrap {
      display: grid;
      gap: 8px;
      width: 100%;
      margin-top: 16px;
    }

    .stage-progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: rgba(26,23,20,0.60);
    }

    .stage-progress-head strong {
      color: var(--text);
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .stage-ticks {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(26,23,20,0.38);
    }

    .stage-ticks span:last-child {
      text-align: right;
    }

    .feature-pair {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
    }

    .feature-box {
      min-height: 92px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .feature-box strong {
      display: block;
      font-size: 17px;
      line-height: 1.4;
      color: var(--text);
    }

    .feature-box span {
      color: rgba(26,23,20,0.76);
      font-size: 14px;
      line-height: 1.55;
    }

    .token-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: 100%;
    }

    .token-chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(201,104,66,0.05);
      border: 1px solid rgba(201,104,66,0.15);
      color: rgba(26,23,20,0.88);
      font-size: 13px;
      line-height: 1.45;
    }

    .accent-line {
      position: relative;
      width: 100%;
      height: 10px;
      margin-top: 4px;
    }

    .accent-line::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 3px;
      border-radius: 999px;
      transform: translateY(-50%) scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg, var(--gold), rgba(201,104,66,0.50));
      opacity: 0.92;
      animation: growDecor 1s cubic-bezier(.2, .9, .3, 1) both;
    }

    .accent-line::after {
      content: "";
      position: absolute;
      right: 0;
      top: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: var(--gold);
      box-shadow: 0 0 12px rgba(208, 176, 127, 0.45);
    }

    }

    .desktop-window {
      display: grid;
      gap: 14px;
      min-height: 164px;
      align-content: start;
    }

    .desktop-window-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .desktop-stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(201,104,66,0.05);
      border: 1px solid rgba(201,104,66,0.15);
      color: var(--gold);
      font-size: 13px;
      line-height: 1.4;
      letter-spacing: 0.04em;
    }

    .desktop-window-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .desktop-window-chip {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(153, 169, 187, 0.08);
      border: 1px solid rgba(26,23,20,0.09);
      color: rgba(26,23,20,0.76);
      font-size: 12px;
      line-height: 1.4;
    }

    .desktop-ops {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .desktop-op {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      transition: background 0.35s ease, border-color 0.35s ease, transform 0.35s ease;
    }

    .desktop-op em {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      font-style: normal;
      font-family: "DM Sans",sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
      background: rgba(201,104,66,0.08);
      border: 1px solid rgba(201,104,66,0.18);
    }

    .desktop-op strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
      font-size: 16px;
      line-height: 1.45;
    }

    .desktop-op span,
    .desktop-op small {
      color: rgba(237, 244, 251, 0.8);
      font-size: 14px;
      line-height: 1.52;
    }

    .desktop-op small {
      grid-column: 2;
      color: var(--muted);
    }

    .desktop-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .desktop-tile {
      min-height: 138px;
      border-radius: 18px;
      padding: 16px;
      background: rgba(26,23,20,0.035);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .desktop-op.is-live,
    .desktop-tile.is-live {
      border-color: rgba(201,104,66,0.26);
      background: rgba(201,104,66,0.06);
      transform: translateY(-2px);
    }

    .desktop-tile strong,
    .search-results strong,
    .library-answer strong,
    .risk-center strong {
      color: var(--text);
    }

    .desktop-tile span,
    .search-results p,
    .library-answer p,
    .risk-center p {
      color: rgba(26,23,20,0.80);
      font-size: 16px;
      line-height: 1.58;
      margin: 0;
    }

    .desktop-cursor {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50% 50% 50% 0;
      background: var(--gold);
      transform: rotate(-45deg);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.26);
      pointer-events: none;
      transition: left 0.8s ease, top 0.8s ease;
      left: 65%;
      top: 44%;
    }

    .search-layout,
    .library-layout,
    .risk-layout {
      display: grid;
      grid-template-columns: 0.35fr 0.65fr;
      height: calc(100% - 42px);
    }

    .search-left,
    .library-left,
    .risk-left {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-right: 1px solid rgba(26,23,20,0.07);
    }

    .search-right,
    .library-right,
    .risk-right {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .library-right {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      align-content: stretch;
    }

    .library-left {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      align-content: stretch;
    }

    .library-layout {
      grid-template-columns: 0.42fr 0.58fr;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 14px;
      padding: 18px;
    }

    .library-query.library-query-wide,
    .library-footprint {
      grid-column: 1 / -1;
    }

    .library-query.library-query-wide {
      min-height: 84px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 18px 20px;
    }

    .library-query-copy {
      min-width: 0;
      font-size: 17px;
      line-height: 1.58;
      color: var(--text);
    }

    .library-query-visual {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 68px;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .library-scan-track {
      position: relative;
      min-height: 54px;
      padding: 0 18px;
      border-radius: 16px;
      background: rgba(245,241,235,0.95);
      border: 1px solid rgba(26,23,20,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      overflow: hidden;
    }

    .library-scan-track::before {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      top: 50%;
      height: 2px;
      border-radius: 999px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, rgba(201,104,66,0.07), rgba(201,104,66,0.15), rgba(201,104,66,0.07));
    }

    .library-scan-chip {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(13, 28, 48, 0.92);
      border: 1px solid rgba(26,23,20,0.12);
      color: rgba(26,23,20,0.74);
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    .library-scan-chip::before {
      content: "";
      width: 7px;
      height: 7px;
      margin-right: 7px;
      border-radius: 50%;
      background: rgba(201,104,66,0.55);
      box-shadow: none;
    }

    .library-lens {
      position: absolute;
      top: 50%;
      left: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(201,104,66,0.70);
      background: radial-gradient(circle, rgba(201,104,66,0.10), rgba(201,104,66,0.02));
      box-shadow: 0 0 12px rgba(201,104,66,0.10);
      transform: translateY(-50%);
      z-index: 2;
    }

    .library-lens::after {
      content: "";
      position: absolute;
      right: -8px;
      bottom: -7px;
      width: 14px;
      height: 3px;
      border-radius: 999px;
      background: rgba(201,104,66,0.72);
      transform: rotate(40deg);
      transform-origin: left center;
    }

    .slide.is-active .library-lens {
      animation: scanLens 5.2s cubic-bezier(.35, .08, .2, .98) infinite;
    }

    .slide.is-active .library-scan-chip:nth-child(1) {
      animation: scanPulse 5.2s ease-in-out infinite;
    }

    .slide.is-active .library-scan-chip:nth-child(2) {
      animation: scanPulse 5.2s ease-in-out 0.9s infinite;
    }

    .slide.is-active .library-scan-chip:nth-child(3) {
      animation: scanPulse 5.2s ease-in-out 1.8s infinite;
    }

    .slide.is-active .library-scan-chip:nth-child(4) {
      animation: scanPulse 5.2s ease-in-out 2.7s infinite;
    }

    .library-query-radar {
      position: relative;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      justify-self: end;
      border: 1px solid rgba(201,104,66,0.16);
      background: radial-gradient(circle, rgba(201,104,66,0.09), rgba(201,104,66,0.01) 60%, transparent 62%);
      overflow: hidden;
    }

    .library-query-radar::before,
    .library-query-radar::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(201,104,66,0.13);
    }

    .library-query-radar::after {
      inset: 18px;
    }

    .library-query-radar span {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 210deg, transparent 0deg, transparent 290deg, rgba(201,104,66,0.32) 332deg, rgba(201,104,66,0.02) 360deg);
      animation: radarSweep 2.8s linear infinite;
    }

    .library-panel {
      min-height: 0;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(26,23,20,0.07);
      display: grid;
      gap: 14px;
    }

    .library-sources-panel {
      grid-template-rows: auto minmax(0, 1fr);
    }

    .library-answer-panel {
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .library-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 2px;
    }

    .library-panel-head strong {
      font-size: 15px;
      line-height: 1.4;
      color: rgba(26,23,20,0.88);
      letter-spacing: 0.06em;
    }

    .library-panel-head span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(201,104,66,0.07);
      border: 1px solid rgba(201,104,66,0.16);
      color: var(--gold);
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.04em;
    }

    .risk-layout {
      grid-template-columns: 0.42fr 0.58fr;
    }

    .risk-left {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      align-content: stretch;
    }

    .risk-right {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      align-content: stretch;
    }

    .search-query,
    .library-query {
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(201,104,66,0.05);
      border: 1px solid rgba(201,104,66,0.13);
      color: var(--text);
      font-size: 16px;
      line-height: 1.58;
      min-height: 88px;
    }

    .result-item,
    .answer-line {
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      color: rgba(26,23,20,0.84);
      font-size: 16px;
      line-height: 1.58;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease, border-color 0.35s ease, background 0.35s ease;
    }

    .result-item.is-live,
    .answer-line.is-live {
      opacity: 1;
      transform: translateY(0);
    }

    .library-answer {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: transparent;
      border: none;
      padding: 0;
      min-height: 0;
    }

    .library-source-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
    }

    .library-source {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      align-content: start;
      gap: 8px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      opacity: 0.32;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .library-source::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 50%;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(201,104,66,0.55), transparent);
      transform: translateY(-50%) scaleX(0);
      transform-origin: left center;
      opacity: 0;
    }

    .library-source strong {
      display: block;
      font-size: 14px;
      line-height: 1.3;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .library-source span {
      display: block;
      font-size: 17px;
      line-height: 1.5;
      color: rgba(237, 244, 251, 0.92);
    }

    .library-source-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
      padding-top: 2px;
    }

    .library-meta-chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(201,104,66,0.05);
      border: 1px solid rgba(201,104,66,0.15);
      color: rgba(26,23,20,0.68);
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    .library-source.is-live {
      opacity: 1;
      transform: translateY(0);
      border-color: rgba(201,104,66,0.18);
      box-shadow: 0 0 16px rgba(201,104,66,0.07);
    }

    .slide.is-active .library-source.is-live::after {
      opacity: 0.92;
      animation: sourceScan 1.1s ease-out both;
    }

    .library-answer-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .library-hit {
      min-height: 90px;
      padding: 14px 14px 12px;
      border-radius: 16px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .library-hit strong {
      display: block;
      font-size: 16px;
      line-height: 1.35;
      color: var(--text);
    }

    .library-hit span {
      display: block;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(26,23,20,0.68);
    }

    .library-answer-route {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .library-route-chip {
      position: relative;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(26,23,20,0.035);
      border: 1px solid rgba(26,23,20,0.09);
      display: inline-flex;
      align-items: center;
      color: rgba(26,23,20,0.74);
      font-size: 13px;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    .library-route-chip:not(:last-child)::after {
      content: "→";
      margin-left: 10px;
      color: var(--gold);
      opacity: 0.72;
    }

    @keyframes scanLens {
      0% { left: 18px; }
      18% { left: 22%; }
      42% { left: 44%; }
      66% { left: 63%; }
      86% { left: calc(100% - 58px); }
      100% { left: calc(100% - 58px); }
    }

    @keyframes scanPulse {
      0%, 100% {
        border-color: rgba(26,23,20,0.09);
        box-shadow: none;
      }
      18%, 30% {
        border-color: rgba(201,104,66,0.22);
        box-shadow: 0 0 10px rgba(201,104,66,0.07);
      }
    }

    @keyframes radarSweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes sourceScan {
      0% {
        transform: translateY(-50%) scaleX(0.12);
        opacity: 0;
      }
      35% {
        transform: translateY(-50%) scaleX(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-50%) scaleX(1);
        opacity: 0;
      }
    }

    .library-answer .bubble.ai {
      max-width: 100%;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      min-height: 100%;
    }

    .library-answer .bubble.ai.is-live {
      opacity: 1;
      transform: translateY(0);
    }

    .answer-line.is-live {
      border-color: rgba(201,104,66,0.26);
      background: rgba(201,104,66,0.05);
    }

    #s16 .compare-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .library-answer {
      min-height: 0;
      display: flex;
    }

    .library-footprint,
    .risk-summary-grid {
      display: grid;
      gap: 12px;
      width: 100%;
    }

    .library-footprint {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .risk-summary-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .library-note,
    .risk-summary-card {
      min-height: 106px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .library-note strong,
    .risk-summary-card strong {
      display: block;
      font-size: 17px;
      line-height: 1.4;
      color: var(--text);
    }

    .library-note span,
    .risk-summary-card span {
      display: block;
      font-size: 14px;
      line-height: 1.52;
      color: rgba(26,23,20,0.76);
    }

    .library-note em {
      display: inline-block;
      font-style: normal;
      font-size: 12px;
      line-height: 1;
      color: var(--gold);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .risk-lane {
      min-height: 0;
      display: flex;
      align-items: center;
    }

    .risk-center {
      display: grid;
      align-content: start;
      gap: 12px;
      min-height: 0;
    }

    .risk-center p.live {
      color: var(--text);
    }

    .flow-chain {
      display: grid;
      grid-template-columns: repeat(11, auto);
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px;
      border-radius: 22px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(26,23,20,0.07);
    }

    .flow-node {
      width: 158px;
      min-height: 148px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(26,23,20,0.035);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      text-align: center;
      opacity: 0.2;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
    }

    .flow-node.is-live {
      opacity: 1;
      transform: translateY(0);
      box-shadow: 0 0 18px rgba(201,104,66,0.18);
      border-color: rgba(201,104,66,0.32);
    }

    .flow-icon {
      font-size: 30px;
    }

    .flow-label {
      font-size: 16px;
      line-height: 1.55;
      color: rgba(26,23,20,0.88);
    }

    .flow-arrow {
      color: rgba(26,23,20,0.20);
      font-size: 28px;
      transition: color 0.4s ease;
    }

    .flow-arrow.is-live {
      color: var(--gold);
    }

    .deployment-stage {
      min-height: 100%;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 16px;
    }

    .deployment-shell {
      padding: 24px 26px;
      border-radius: 24px;
      background:
        radial-gradient(circle at top right, rgba(46,125,82,0.06), transparent 30%),
        linear-gradient(180deg, #FFFFFF, #FAF8F4);
      border: 1px solid rgba(46,125,82,0.18);
      display: grid;
      gap: 18px;
      min-height: 0;
    }

    .deployment-badge-row,
    .deployment-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .deployment-chip,
    .security-chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(125, 215, 173, 0.1);
      border: 1px solid rgba(46,125,82,0.18);
      color: rgba(26,23,20,0.80);
      font-size: 13px;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    .deployment-flow {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: stretch;
      gap: 16px;
      padding-top: 18px;
    }

    .deployment-flow::before {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      top: 30px;
      height: 2px;
      background: linear-gradient(90deg, rgba(46,125,82,0.12), rgba(46,125,82,0.55), rgba(46,125,82,0.12));
    }

    .deployment-flow::after {
      content: "";
      position: absolute;
      top: 26px;
      left: 8%;
      width: 18%;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(46,125,82,0), rgba(46,125,82,0.75), rgba(46,125,82,0));
      filter: blur(4px);
      opacity: 0;
    }

    .slide.is-active .deployment-flow::after {
      opacity: 0.9;
      animation: deploymentPulse 4.2s ease-in-out infinite;
    }

    .deployment-node {
      position: relative;
      min-height: 192px;
      min-width: 0;
      padding: 48px 18px 18px;
      border-radius: 20px;
      background: rgba(26,23,20,0.035);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 12px;
      text-align: left;
      overflow: hidden;
    }

    .deployment-node::before {
      content: attr(data-step);
      position: absolute;
      top: 14px;
      left: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(46,125,82,0.08);
      border: 1px solid rgba(46,125,82,0.16);
      color: rgba(26,23,20,0.80);
      font-family: "DM Sans",sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .deployment-node::after {
      content: "";
      position: absolute;
      top: 23px;
      left: calc(50% - 5px);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(46,125,82,0.88);
      box-shadow: 0 0 0 0 rgba(46,125,82,0.28);
    }

    .slide.is-active .deployment-node::after {
      animation: deploymentDot 2.4s ease-in-out infinite;
    }

    .deployment-node strong {
      display: block;
      font-size: 20px;
      line-height: 1.35;
      color: var(--text);
    }

    .deployment-node span {
      display: block;
      font-size: 15px;
      line-height: 1.58;
      color: rgba(26,23,20,0.74);
    }

    .deployment-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(26,23,20,0.030);
      border: 1px solid rgba(168, 193, 221, 0.1);
      color: rgba(26,23,20,0.68);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .deployment-status b {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(46,125,82,0.88);
      box-shadow: 0 0 0 0 rgba(46,125,82,0.30);
      display: block;
    }

    .slide.is-active .deployment-status b {
      animation: deploymentDot 2.1s ease-in-out infinite;
    }

    .deployment-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
    }

    .deployment-meta span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(46,125,82,0.06);
      border: 1px solid rgba(46,125,82,0.13);
      color: rgba(26,23,20,0.68);
      font-size: 12px;
      line-height: 1;
    }

    .deployment-arrow {
      color: rgba(46,125,82,0.60);
      font-size: 28px;
      text-align: center;
    }

    .deployment-compare {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .deployment-compare-card {
      min-height: 150px;
      padding: 18px 20px;
      border-radius: 20px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(168, 193, 221, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .deployment-compare-card strong {
      display: block;
      font-size: 20px;
      line-height: 1.38;
      color: var(--text);
    }

    .deployment-compare-card p {
      margin: 0;
      font-size: 15px;
      line-height: 1.58;
      color: rgba(26,23,20,0.76);
    }

    @keyframes deploymentPulse {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(440%);
      }
    }

    @keyframes deploymentDot {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(46,125,82,0.28);
        opacity: 0.7;
      }
      50% {
        box-shadow: 0 0 0 10px rgba(46,125,82,0);
        opacity: 1;
      }
    }

    .risk-stage {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
    }

    .risk-stage-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(201,104,66,0.05);
      border: 1px solid rgba(201,104,66,0.13);
    }

    .risk-stage-head strong {
      display: block;
      font-size: 18px;
      line-height: 1.45;
      color: var(--text);
    }

    .risk-stage-head span {
      color: var(--gold);
      font-size: 13px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .risk-workbench {
      display: grid;
      grid-template-columns: 0.44fr 0.56fr;
      gap: 14px;
      min-height: 0;
    }

    .risk-sheet,
    .risk-analysis-log {
      min-height: 0;
      padding: 18px;
      border-radius: 20px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(26,23,20,0.07);
    }

    .risk-sheet {
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .risk-sheet-title,
    .risk-log-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: rgba(26,23,20,0.88);
      font-size: 15px;
      letter-spacing: 0.04em;
    }

    .risk-sheet-line {
      padding: 14px 15px;
      border-radius: 14px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      color: rgba(26,23,20,0.76);
      font-size: 15px;
      line-height: 1.56;
    }

    .risk-analysis-log {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .risk-log-list {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .risk-log-line {
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      color: rgba(26,23,20,0.76);
      font-size: 15px;
      line-height: 1.58;
      opacity: 0.34;
      transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease, border-color 0.35s ease, background 0.35s ease;
    }

    .risk-log-line.live {
      opacity: 1;
      transform: translateY(0);
      border-color: rgba(201,104,66,0.20);
      background: rgba(201,104,66,0.05);
    }

    .risk-lane {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto;
      align-content: start;
      gap: 12px;
    }

    .risk-lane-head strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
      line-height: 1.4;
      color: var(--text);
    }

    .risk-lane-head span {
      display: block;
      font-size: 14px;
      line-height: 1.56;
      color: rgba(237, 244, 251, 0.8);
    }

    .risk-scan-preview {
      position: relative;
      min-height: 78px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(245,241,235,0.96);
      border: 1px solid rgba(26,23,20,0.07);
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      flex-wrap: wrap;
    }

    .risk-scan-preview::before {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: 50%;
      height: 2px;
      border-radius: 999px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, transparent, rgba(201,104,66,0.32), transparent);
      opacity: 0.6;
    }

    .risk-mini-chip {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(13, 28, 48, 0.9);
      border: 1px solid rgba(153, 169, 187, 0.14);
      color: rgba(26,23,20,0.68);
      font-size: 12px;
      line-height: 1;
    }

    .risk-mini-lens {
      position: absolute;
      top: 50%;
      left: 16px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(201,104,66,0.68);
      background: radial-gradient(circle, rgba(201,104,66,0.10), rgba(201,104,66,0.01));
      transform: translateY(-50%);
      box-shadow: 0 0 12px rgba(201,104,66,0.08);
      z-index: 2;
    }

    .risk-mini-lens::after {
      content: "";
      position: absolute;
      right: -7px;
      bottom: -6px;
      width: 12px;
      height: 3px;
      border-radius: 999px;
      background: rgba(201,104,66,0.68);
      transform: rotate(42deg);
      transform-origin: left center;
    }

    .slide.is-active .risk-lane.is-live .risk-mini-lens {
      animation: scanLens 4.8s cubic-bezier(.35, .08, .2, .98) infinite;
    }

    .platform-wall {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
    }

    .platform-card {
      min-height: 178px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      opacity: 0.28;
      transform: translateY(12px);
      transition: opacity 0.35s ease, transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }

    .platform-card.is-live {
      opacity: 1;
      transform: translateY(0);
      border-color: rgba(201,104,66,0.20);
      box-shadow: 0 0 16px rgba(201,104,66,0.07);
    }

    .platform-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .platform-top strong {
      font-size: 17px;
      line-height: 1.4;
      color: var(--text);
    }

    .platform-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(201,104,66,0.07);
      border: 1px solid rgba(201,104,66,0.16);
      color: var(--gold);
      font-size: 12px;
      line-height: 1;
    }

    .platform-post {
      padding: 14px;
      border-radius: 14px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(26,23,20,0.07);
      color: rgba(26,23,20,0.76);
      font-size: 14px;
      line-height: 1.56;
    }

    .platform-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.03em;
    }

    .statement-support {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
      margin-top: auto;
    }

    .statement-support-item {
      min-height: 118px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .statement-support-item strong {
      display: block;
      font-size: 18px;
      line-height: 1.4;
      color: var(--text);
    }

    .statement-support-item span {
      display: block;
      font-size: 14px;
      line-height: 1.55;
      color: rgba(26,23,20,0.74);
    }

    .particle-field {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      opacity: 0.25;
      animation: drift 12s linear infinite;
    }

    @keyframes drift {
      0% {
        transform: translate3d(0, 18px, 0);
        opacity: 0;
      }
      20%,
      80% {
        opacity: 0.5;
      }
      100% {
        transform: translate3d(18px, -24px, 0);
        opacity: 0;
      }
    }

    .cover-title {
      white-space: nowrap;
    }

    .ending-line {
      display: block;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .ending-line.is-live {
      opacity: 1;
      transform: translateY(0);
    }

    .kanban-body {
      height: calc(100% - 42px);
      padding: 20px;
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .kanban-col {
      border-radius: 20px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(26,23,20,0.07);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .kanban-col h4 {
      margin: 0;
      font-size: 20px;
    }

    .task-card {
      min-height: 108px;
      transition: transform 0.5s ease, border-color 0.4s ease, background 0.4s ease;
    }

    .task-card.done {
      border-color: rgba(46,125,82,0.28);
      background: rgba(46,125,82,0.05);
    }

    .task-card.live {
      border-color: rgba(201,104,66,0.28);
      background: rgba(201,104,66,0.05);
      transform: translateX(6px);
    }

    .terminal {
      min-height: 400px;
      border-radius: 24px;
      border: 1px solid rgba(26,23,20,0.09);
      background: #F5F1EB;
      overflow: hidden;
    }

    .terminal-body {
      padding: 22px 24px;
      font-family: "DM Sans",sans-serif;
      font-size: 17px;
      line-height: 1.78;
      color: rgba(26,23,20,0.84);
      white-space: pre-wrap;
    }

    .terminal-line {
      display: block;
    }

    .terminal-line.live {
      color: var(--gold);
    }

    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      align-content: stretch;
      grid-auto-rows: 1fr;
    }

    .compare-card {
      border-radius: 24px;
      padding: 28px;
      background: #FFFFFF;
      border: 1px solid rgba(26,23,20,0.09);
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 272px;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .compare-card.is-live {
      opacity: 1;
      transform: translateY(0);
    }

    .compare-card h3 {
      margin: 0;
      font-size: 26px;
    }

    .compare-card p {
      margin: 0;
      color: rgba(26,23,20,0.84);
      line-height: 1.66;
      font-size: 17px;
    }

    .badge-block {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(26,23,20,0.07);
      width: fit-content;
      color: rgba(237, 244, 251, 0.92);
      font-size: 15px;
    }

    .faux-photo {
      min-height: 260px;
      border-radius: 20px;
      border: 1px solid rgba(168, 193, 221, 0.1);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), transparent),
        linear-gradient(180deg, rgba(61,110,155,0.30) 0%, rgba(90,105,115,0.22) 42%, rgba(60,55,50,0.25) 100%);
      position: relative;
      overflow: hidden;
    }

    .faux-photo::before,
    .faux-photo::after {
      content: "";
      position: absolute;
      bottom: 0;
      background: rgba(26,23,20,0.07);
      border: 1px solid rgba(26,23,20,0.10);
    }

    .faux-photo::before {
      left: 16%;
      width: 22%;
      height: 60%;
      box-shadow: 70px 10px 0 -1px rgba(238, 240, 243, 0.1), 138px -10px 0 -3px rgba(238, 240, 243, 0.08);
    }

    .faux-photo::after {
      right: 12%;
      width: 18%;
      height: 44%;
      box-shadow: -160px -16px 0 4px rgba(238, 240, 243, 0.08);
    }

    .photo-scan {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 40%;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(201,104,66,0.03) 25%,
        rgba(201,104,66,0.40) 50%,
        rgba(201,104,66,0.03) 75%,
        transparent 100%
      );
      transform: translateY(-100%);
      opacity: 0;
    }

    .wave-card {
      padding: 20px 22px;
      border-radius: 18px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(153, 169, 187, 0.1);
      display: grid;
      gap: 14px;
    }

    .voice-wave {
      display: grid;
      grid-template-columns: repeat(18, minmax(0, 1fr));
      align-items: center;
      gap: 6px;
      min-height: 88px;
      padding: 10px 0;
    }

    .wave-bar {
      height: var(--h, 28px);
      border-radius: 999px;
      background: linear-gradient(180deg, var(--gold), rgba(201,104,66,0.55));
      opacity: 0.92;
      transform-origin: center;
    }

    .slide.is-active .wave-bar {
      animation: wavePulse 1.8s ease-in-out infinite;
      animation-delay: var(--d, 0s);
    }

    @keyframes wavePulse {
      0%, 100% {
        transform: scaleY(0.72);
        opacity: 0.46;
      }
      50% {
        transform: scaleY(1.12);
        opacity: 1;
      }
    }

    .photo-scan.play {
      opacity: 1;
      animation: scan 2.4s ease-in-out infinite;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      50% { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }

    .calc-panel {
      border-radius: 22px;
      border: 1px solid rgba(26,23,20,0.09);
      background: rgba(26,23,20,0.025);
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      align-items: stretch;
    }

    .calc-fields {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 16px;
      align-items: center;
      font-size: 17px;
      color: rgba(26,23,20,0.88);
    }

    .field input[type="range"] {
      width: 100%;
      accent-color: var(--gold);
    }

    .calc-output {
      border-radius: 20px;
      background: rgba(208, 176, 127, 0.08);
      border: 1px solid rgba(201,104,66,0.18);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .calc-output strong {
      font-family: "DM Sans",sans-serif;
      font-size: 60px;
      letter-spacing: -0.05em;
      color: var(--gold);
    }

    .tool-map {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
      align-content: stretch;
      grid-auto-rows: 1fr;
    }

    .tool-card {
      padding: 24px 24px;
      border-radius: 22px;
      background: #FFFFFF;
      border: 1px solid rgba(26,23,20,0.09);
      min-height: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tool-card h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.38;
    }

    .tool-card p,
    .tool-card li {
      margin: 0;
      font-size: 16px;
      line-height: 1.62;
      color: rgba(26,23,20,0.84);
    }

    .tool-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .principles {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
    }

    .principle {
      padding: 18px;
      border-radius: 18px;
      background: rgba(26,23,20,0.035);
      border: 1px solid rgba(153, 169, 187, 0.1);
      color: rgba(26,23,20,0.84);
      font-size: 16px;
      line-height: 1.6;
      min-height: 148px;
    }

    .matrix {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
      align-content: stretch;
      grid-auto-rows: 1fr;
    }

    .matrix-col {
      border-radius: 22px;
      padding: 24px 26px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(168, 193, 221, 0.1);
      min-height: 320px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .matrix-col h3 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .matrix-col ul {
      margin: 0;
      padding-left: 18px;
      font-size: 17px;
      line-height: 1.66;
      color: rgba(26,23,20,0.84);
    }

    .matrix-col li + li {
      margin-top: 10px;
    }

    .warning-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
      align-content: stretch;
      grid-auto-rows: 1fr;
    }

    .warning-card {
      border-radius: 22px;
      padding: 24px 26px;
      background: linear-gradient(180deg, rgba(212,66,53,0.05), #FFFFFF);
      border: 1px solid rgba(212,66,53,0.14);
      border-left: 4px solid var(--red);
      border-radius: 4px 22px 22px 4px;
      min-height: 320px;
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .warning-card.is-live {
      opacity: 1;
      transform: translateX(0);
    }

    .warning-card::before {
      content: "⚠ 警示";
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 139, 139, 0.15);
      color: var(--red);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

      margin: 0 0 10px;
      font-size: 24px;
    }

    .warning-card p {
      margin: 0;
      font-size: 17px;
      line-height: 1.66;
      color: rgba(26,23,20,0.84);
    }

    .warning-card .mini-pill {
      margin-bottom: 12px;
    }

    .warning-probe {
      display: grid;
      gap: 10px;
      width: 100%;
      margin-top: 16px;
    }

    .warning-probe-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .probe-node {
      position: relative;
      min-height: 76px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(212,66,53,0.14);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .probe-node::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, transparent 10%, rgba(255,255,255,0.42) 45%, transparent 80%);
      transform: translateX(-140%);
      animation: probeSweep 3.2s ease-in-out infinite;
    }

    .probe-node strong,
    .probe-node span {
      position: relative;
      z-index: 1;
    }

    .probe-node strong {
      font-size: 14px;
      line-height: 1.4;
      color: var(--text);
    }

    .probe-node span {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .probe-node.is-cyan {
      border-color: rgba(201,104,66,0.14);
    }

    .probe-node.is-gold {
      border-color: rgba(208, 176, 127, 0.24);
    }

    @keyframes probeSweep {
      0% {
        transform: translateX(-140%);
      }
      55% {
        transform: translateX(140%);
      }
      100% {
        transform: translateX(140%);
      }
    }

    .redline-grid {
      display: grid;
      gap: 16px;
      width: 100%;
    }

    .redline-grid.redline-grid-quad {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .redline {
      display: grid;
      grid-template-columns: 116px 1fr 110px;
      gap: 20px;
      align-items: stretch;
      padding: 18px 20px;
      border-radius: 20px;
      background:
        linear-gradient(90deg, rgba(212,66,53,0.10), rgba(212,66,53,0.01) 28%),

      border: 1px solid rgba(255, 139, 139, 0.22);
      opacity: 0;
      transform: translateX(-30px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .redline.is-live {
      opacity: 1;
      transform: translateX(0);
    }

    .redline::after {
      content: "✗ 禁止";
      align-self: center;
      justify-self: end;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(212,66,53,0.09);
      border: 1px solid rgba(212,66,53,0.20);
      color: #9B2219;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .redline-index {
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-family: "DM Sans",sans-serif;
      font-size: 30px;
      color: #9B2219;
      background: rgba(212,66,53,0.10);
    }

    .redline-grid-quad .redline {
      position: relative;
      grid-template-columns: 92px 1fr;
      padding: 18px 110px 18px 18px;
      min-height: 214px;
    }

    .redline-grid-quad .redline::after {
      position: absolute;
      top: 16px;
      right: 16px;
      align-self: auto;
      justify-self: auto;
    }

    .redline-main {

      gap: 12px;
      align-content: center;
    }

    .redline-main h3 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.35;
    }

      margin: 0;
      font-size: 16px;
      line-height: 1.58;
      color: rgba(26,23,20,0.80);
    }

    .redline-cases {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

      padding: 12px 14px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;

      background: rgba(26,23,20,0.025);
      border: 1px solid rgba(26,23,20,0.09);
    }

    .redline-case.safe {

      background: rgba(61,110,155,0.05);
    }

    .redline-case.risk {
      border-color: rgba(255, 139, 139, 0.2);

    .redline-case label {

      letter-spacing: 0.08em;

    }

    .redline-case strong {
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
    }

    .redline-case span {
      font-size: 12px;
      line-height: 1.45;
      color: rgba(26,23,20,0.65);
    }

    .roadmap {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
      padding-top: 26px;
      align-content: stretch;

    }

    .roadmap::before {
      content: "";

      left: 16.5%;

    }

    .roadmap-card::before {

      height: 14px;

    }

    .roadmap-stage {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(201,104,66,0.05);
      color: var(--gold);
      border: 1px solid rgba(201,104,66,0.16);

    .ending-quote {

    .ending-actions {

    }

    .ending-action {

    function formatCounter(value, format, suffix) {
      if (format === "short") {
        if (value >= 10000) {
          return `${(value / 10000).toFixed(1)}万${suffix || ""}`;
        }
      }
      return `${Math.round(value).toLocaleString("zh-CN")}${suffix || ""}`;
    }

    function animateCounters(slide, token) {
      slide.querySelectorAll("[data-counter]").forEach((el) => {
        const target = Number(el.dataset.counter);
        const suffix = el.dataset.suffix || "";
        const format = el.dataset.format || "";
        const start = performance.now();
        const duration = 1300;
        function tick(now) {
          if (token !== playToken) return;
          const progress = Math.min(1, (now - start) / duration);
          const value = Math.round(target * (1 - Math.pow(1 - progress, 3)));
          el.textContent = formatCounter(value, format, progress === 1 ? suffix : "");
          if (progress < 1) {
            requestAnimationFrame(tick);
          } else {
            el.textContent = formatCounter(target, format, suffix);
          }
        }
        el.textContent = "0";
        requestAnimationFrame(tick);
      });
    }

      document.querySelectorAll(".bar-chart").forEach((chart) => {
        if (chart.dataset.rendered) return;
        const bars = JSON.parse(chart.dataset.bars || "[]");

          <div class="bar-col">

            <div class="bar ${bar.tone || ""}" data-height="${bar.value}" data-suffix="${bar.suffix || ""}"></div>
            <div class="bar-label">${bar.label}</div>
          </div>
        `).join("");
        chart.dataset.rendered = "1";
      });
    }

    function animateCharts(slide) {
      slide.querySelectorAll(".bar-chart").forEach((chart) => {

        chart.querySelectorAll(".bar").forEach((bar) => {
          const height = Number(bar.dataset.height || 0);
          bar.style.height = "0%";
          requestAnimationFrame(() => {
            bar.style.height = `${Math.max(8, (height / max) * 100)}%`;
          });
        });
      });
    }

      const inputs = document.querySelectorAll("[data-calc]");
      const update = () => {
        const values = {};
        inputs.forEach((input) => {
          values[input.dataset.calc] = Number(input.value);
          const text = input.dataset.calc === "rooms"
            ? `${input.value} 间`
            : input.dataset.calc === "rent"
              ? `${input.value} 元`
              : `${input.value}%`;
          document.querySelector(`[data-calc-value="${input.dataset.calc}"]`).textContent = text;
        });
        const income = Math.round(values.rooms * values.rent * values.occupancy / 100);
        result.textContent = income.toLocaleString("zh-CN");
      };
      inputs.forEach((input) => input.addEventListener("input", update));
      update();

    function playPhotoScan(slide) {
      slide.querySelectorAll(".photo-scan").forEach((scan) => {
        scan.classList.remove("play");
        void scan.offsetHeight;
        scan.classList.add("play");
      });
    }

    function addParticles(container, count = 36) {
      if (!container || container.querySelector(".particle-field")) return;
      const field = document.createElement("div");
      field.className = "particle-field";
      for (let i = 0; i < count; i += 1) {
        const dot = document.createElement("span");
        dot.className = "particle";
        dot.style.left = `${Math.random() * 100}%`;
        dot.style.top = `${Math.random() * 100}%`;
        dot.style.background = i % 2 === 0 ? "rgba(201,104,66,0.55)" : "rgba(201,104,66,0.30)";
        dot.style.animationDelay = `${Math.random() * 8}s`;
        dot.style.animationDuration = `${10 + Math.random() * 8}s`;
        field.appendChild(dot);
      }
      container.appendChild(field);
    }

    async function playCover(slide, token) {
      const inner = slide.querySelector(".cover-inner");
      const title = slide.querySelector(".cover-title");
      const subtitle = slide.querySelector(".cover-subtitle");
      const time = slide.querySelector(".cover-time");
      if (!title) return;
      addParticles(inner, 50);
      if (!title.dataset.fulltext) title.dataset.fulltext = title.textContent;
      title.textContent = "";
      title.style.borderRight = "2px solid var(--gold)";
      subtitle.style.opacity = "0";
      time.style.opacity = "0";
      await typeText(title, title.dataset.fulltext, 55, token);
      if (token !== playToken) return;
      title.style.borderRight = "none";
      subtitle.style.transition = "opacity 0.5s ease";
      time.style.transition = "opacity 0.5s ease";
      subtitle.style.opacity = "1";
      await sleep(300);
      time.style.opacity = "1";
    }

    function playSection(slide) {
      const inner = slide.querySelector(".section-inner");
      addParticles(inner, 40);
    }

    async function playEnding(slide, token) {
      const quote = slide.querySelector(".ending-quote");
      if (quote && !quote.dataset.prepared) {
        const lines = quote.innerHTML.split("<br>");
        quote.innerHTML = lines.map((line) => `<span class="ending-line">${line}</span>`).join("");
        quote.dataset.prepared = "1";
      }
      slide.querySelector(".stack")?.classList && addParticles(slide.querySelector(".stack"), 30);
      const lines = slide.querySelectorAll(".ending-line");
      const actions = slide.querySelectorAll(".ending-action");
      for (let i = 0; i < lines.length; i += 1) {
        if (token !== playToken) return;
        lines[i].classList.add("is-live");
        await sleep(200);
      }
      for (let i = 0; i < actions.length; i += 1) {
        if (token !== playToken) return;
        actions[i].classList.add("is-live");
        await sleep(140);
      }
    }

    function staggerReveal(slide, selector, delay = 150) {
      const items = slide.querySelectorAll(selector);
      items.forEach((item, i) => {
        item.classList.remove("is-live");
        setTimeout(() => {
          if (item.closest(".slide")?.classList.contains("is-active")) item.classList.add("is-live");
        }, delay + i * 200);
      });
    }

    function runAnimations(slide, token) {
      animateCounters(slide, token);
      animateCharts(slide, token);
      slide.querySelectorAll(".steps[data-steps]").forEach((el) => playSteps(el, token));
      playPhotoScan(slide);
      if (slide.classList.contains("cover-slide")) playCover(slide, token);
      if (slide.classList.contains("section-slide")) playSection(slide);
      slide.querySelectorAll(".chat-demo").forEach((demo) => playChatDemo(demo, token));
      slide.querySelectorAll(".desktop-demo").forEach((demo) => playDesktopDemo(demo, token));
      slide.querySelectorAll(".search-demo").forEach((demo) => playSearchDemo(demo, token));
      slide.querySelectorAll(".kanban-demo").forEach((demo) => playKanban(demo, token));
      slide.querySelectorAll(".library-demo").forEach((demo) => playLibrary(demo, token));
      slide.querySelectorAll(".risk-demo").forEach((demo) => playRisk(demo, token));
      slide.querySelectorAll(".social-demo").forEach((demo) => playSocial(demo, token));
      staggerReveal(slide, ".compare-card");
      staggerReveal(slide, ".warning-card");
      staggerReveal(slide, ".redline");
      const roadmap = slide.querySelector(".roadmap");
      if (roadmap) {
        roadmap.classList.add("is-live");
        staggerReveal(slide, ".roadmap-card", 250);
      }
      if (slide.id === "s51") playEnding(slide, token);
    }

    function nextSlide() {
      showSlide(Math.min(totalSlides - 1, current + 1));
    }

    function prevSlide() {
      showSlide(Math.max(0, current - 1));
    }

    window.addEventListener("keydown", (event) => {
      if (["ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        nextSlide();
      } else if (["ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        prevSlide();
      } else if (event.key === "Home") {
        showSlide(0);
      } else if (event.key === "End") {
        showSlide(totalSlides - 1);
      }
    });

    deck.addEventListener("click", (event) => {
      const target = event.target.closest(".slide");
      if (!target) return;
      nextSlide();
    });

    renderCharts();
    fitDeck();
    initCalc();
    showSlide(current);
    window.addEventListener("resize", fitDeck);
  </script>
</body>
</html>
